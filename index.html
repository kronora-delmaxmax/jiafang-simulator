<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>双世界牛马养成 · 原型 v0.6</title>
<style>
:root{
  --bg:#F6F1E9;--bg2:#EFE6D8;--ink:#3A332B;--line:#D9CDB6;--accent:#D9A37A;
  --dark:#0E1014;--dark2:#1A1D24;--darkink:#C5CDD9;--darkline:#2A2F3A;
  --danger:#A83C3C;--cool:#97B8D8;--exp:#6A8FB8;
  --r-md:10px;--r-lg:14px;--r-xl:18px;
  --r-md-d:4px;--r-lg-d:6px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
/* 覆盖系统"减少动态效果"：这个 app 的微动画是核心氛围，不过滤 */
@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.001ms!important;animation-iteration-count:1!important;transition-duration:0.001ms!important}
}
html,body{height:100%}
body{font-family:'PingFang SC',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--ink);overflow:hidden;user-select:none;-webkit-user-select:none;transition:background .6s ease,color .6s ease}
body.dark{background:var(--dark);color:var(--darkink)}
.phone{position:relative;margin:0 auto;width:100%;max-width:420px;height:100vh;max-height:920px;background:inherit;overflow:hidden;display:flex;flex-direction:column}
.status{flex:0 0 30px;display:flex;justify-content:space-between;align-items:center;padding:0 18px;font-size:11px;letter-spacing:1px;border-bottom:1px solid var(--line);background:inherit;transition:border-color .6s}
body.dark .status{border-color:var(--darkline)}
.status .right{display:flex;gap:6px;align-items:center}
.dot{width:5px;height:5px;background:currentColor;border-radius:50%}
.bars{flex:0 0 auto;padding:8px 14px 4px;background:inherit;border-bottom:1px dashed var(--line);transition:border-color .6s}
body.dark .bars{border-color:var(--darkline)}
.bar-row{display:grid;grid-template-columns:36px 1fr 26px;align-items:center;gap:6px;margin:2px 0;font-size:10px}
.bar-row .label{opacity:.7}
.bar{height:6px;background:rgba(0,0,0,.08);border-radius:3px;overflow:hidden;position:relative}
body.dark .bar{background:rgba(255,255,255,.06)}
.bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),#E8C39B);transition:width .5s ease}
body.dark .bar > i{background:linear-gradient(90deg,var(--cool),#5C7691)}
.bar.tired > i{background:linear-gradient(90deg,#B89A6F,#7A5C3A)}
.bar.injury > i{background:linear-gradient(90deg,#C97070,#7A2A2A)}
body.dark .bar.injury > i{background:linear-gradient(90deg,var(--danger),#5C1A1A)}
.bar.favor > i{background:linear-gradient(90deg,#E89BB1,#B95A78)}
.bar.exp > i{background:linear-gradient(90deg,#A8C5E8,var(--exp))}
.bar.pressure > i{background:linear-gradient(90deg,#D9B97A,#B8956A)}
.val{text-align:right;font-size:9px;opacity:.6}
.val.lvl{color:var(--exp);font-weight:700;opacity:1}

.stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;position:relative;padding:8px 16px 4px;min-height:0;overflow:hidden}
.scene-tag{position:absolute;top:6px;left:50%;transform:translateX(-50%);font-size:9px;letter-spacing:2px;padding:2px 8px;border:1px solid var(--line);border-radius:99px;background:rgba(255,255,255,.4);transition:all .6s;z-index:2}
body.dark .scene-tag{border-color:var(--darkline);background:rgba(0,0,0,.3);color:var(--darkink);border-radius:var(--r-md-d)}
.task-badge{position:absolute;top:6px;right:14px;font-size:9px;padding:2px 7px;border-radius:99px;background:rgba(255,255,255,.6);border:1px solid var(--line);color:var(--ink);transition:all .6s;z-index:2;cursor:pointer}
body.dark .task-badge{border-color:var(--darkline);background:rgba(0,0,0,.4);color:var(--darkink);border-radius:var(--r-md-d)}
.lvl-badge{position:absolute;top:6px;left:14px;font-size:9px;padding:2px 7px;border-radius:99px;background:rgba(106,143,184,.18);border:1px solid var(--exp);color:var(--exp);font-weight:700;letter-spacing:1px;z-index:2}

/* 表世界：圆角偏大、柔光、轻微呼吸 */
.office-deco{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .6s;overflow:hidden}
body[data-scene="work"] .office-deco{opacity:1}
.office-deco .note{position:absolute;width:36px;height:24px;background:#F8E9A8;border:1px solid #C8B776;border-radius:4px;transform:rotate(-6deg);box-shadow:1px 1px 0 rgba(0,0,0,.1);font-size:7px;color:#8A6A2A;padding:2px;line-height:1.2;overflow:hidden;animation:noteFloat 5s ease-in-out infinite}
.office-deco .note::before{content:'';position:absolute;left:4px;right:4px;top:7px;bottom:5px;background:repeating-linear-gradient(0deg,transparent,transparent 3px,#C8B776 3px,#C8B776 4px)}
.office-deco .note-1{top:30px;left:18px;animation-delay:0s}
.office-deco .note-2{top:80px;right:22px;transform:rotate(8deg);background:#E8C8A8;animation-delay:1.5s}
.office-deco .calendar{position:absolute;top:46px;right:14px;width:30px;height:30px;background:#fff;border:1px solid var(--line);border-radius:6px;font-size:7px;color:var(--ink);text-align:center;padding-top:2px;animation:noteFloat 6s ease-in-out infinite;animation-delay:0.8s}
body.dark .office-deco .calendar{background:#222}
.office-deco .calendar::before{content:'';position:absolute;top:-3px;left:50%;transform:translateX(-50%);width:14px;height:6px;background:#C97070;border-radius:0 0 4px 4px}
.office-deco .doc{position:absolute;width:30px;height:38px;background:#fff;border:1px solid var(--line);border-radius:4px;box-shadow:0 1px 2px rgba(0,0,0,.1);font-size:6px;color:var(--ink);padding:3px 2px;line-height:1.3;animation:noteFloat 7s ease-in-out infinite;animation-delay:2.2s}
body.dark .office-deco .doc{background:#1A1D24;color:var(--darkink)}
.office-deco .doc::before{content:'';position:absolute;left:3px;right:3px;top:7px;bottom:5px;background:repeating-linear-gradient(0deg,transparent,transparent 2px,var(--line) 2px,var(--line) 3px)}
.office-deco .doc-1{bottom:48px;left:14px;transform:rotate(-4deg)}
.office-deco .doc-2{bottom:54px;right:16px;transform:rotate(3deg)}
@keyframes noteFloat{0%,100%{transform:translateY(0) rotate(var(--r,-6deg))}50%{transform:translateY(-3px) rotate(calc(var(--r,-6deg) + 1deg))}}

/* 里世界：锐利、抖动、裂痕闪烁 */
.dark-deco{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .6s;overflow:hidden}
body[data-scene="battle"] .dark-deco{opacity:1}
.dark-deco .crack{position:absolute;font-size:80px;color:rgba(168,60,60,.2);font-weight:900;line-height:1;transform:rotate(-15deg);animation:crackFlicker 3s ease-in-out infinite}
.dark-deco .crack-1{top:60px;left:14px;animation-delay:0s}
.dark-deco .crack-2{bottom:60px;right:14px;transform:rotate(20deg) scaleX(-1);font-size:60px;animation-delay:1.5s}
@keyframes crackFlicker{0%,100%{opacity:.15;text-shadow:0 0 6px rgba(168,60,60,.4)}50%{opacity:.4;text-shadow:0 0 14px rgba(168,60,60,.8)}}
.dark-deco .monster{position:absolute;bottom:36px;font-size:24px;opacity:.35;filter:blur(1px);color:var(--darkink);animation:monsterShake 4s ease-in-out infinite}
.dark-deco .monster-1{left:12px;transform:scaleX(-1);animation-delay:0s}
.dark-deco .monster-2{right:12px;animation-delay:2s}
@keyframes monsterShake{0%,100%{transform:translateX(0) scaleX(var(--sx,-1))}25%{transform:translateX(-2px) scaleX(var(--sx,-1))}75%{transform:translateX(2px) scaleX(var(--sx,-1))}}
.dark-deco .monster-1{--sx:-1}
.dark-deco .monster-2{--sx:1}
.dark-deco .moon{position:absolute;top:30px;right:24px;width:24px;height:24px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#E0E0E0,#7A7A8A);box-shadow:0 0 12px rgba(151,184,216,.4);opacity:.6;animation:moonGlow 6s ease-in-out infinite}
.dark-deco .moon::before{content:'';position:absolute;top:2px;right:3px;width:6px;height:6px;border-radius:50%;background:rgba(14,16,20,.5)}
@keyframes moonGlow{0%,100%{box-shadow:0 0 8px rgba(151,184,216,.3)}50%{box-shadow:0 0 18px rgba(151,184,216,.6)}}
.dark-deco .mist{position:absolute;left:0;right:0;bottom:0;height:80px;background:linear-gradient(180deg,transparent 0%,rgba(151,184,216,.06) 30%,rgba(151,184,216,.15) 100%);filter:blur(6px);pointer-events:none;animation:mistDrift 8s ease-in-out infinite}
@keyframes mistDrift{0%,100%{transform:translateX(0);opacity:.8}50%{transform:translateX(8px);opacity:1}}
.dark-deco .vignette{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,.4) 100%);pointer-events:none}

.sprite{width:128px;height:192px;position:relative;display:flex;align-items:flex-end;justify-content:center;image-rendering:pixelated;z-index:3}
.sprite img{width:100%;height:100%;object-fit:contain;display:block;image-rendering:pixelated;transition:filter .4s,transform .4s}
.sprite[data-form="work"] img{transform:translateY(6px) scale(.96);filter:brightness(1.02) saturate(.92)}
.sprite[data-form="battle"] img{transform:translateY(0) scale(1);filter:brightness(.92) contrast(1.08)}
.sprite .desk{position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:240px;height:18px;background:var(--bg2);border-radius:6px 6px 0 0;box-shadow:0 2px 0 rgba(0,0,0,.05);opacity:0;transition:opacity .4s;pointer-events:none;z-index:1}
body.dark .sprite .desk{background:#15181F;box-shadow:0 2px 0 rgba(0,0,0,.5);border-radius:var(--r-md-d) var(--r-md-d) 0 0}
.sprite .mug{position:absolute;bottom:14px;right:-12px;width:12px;height:14px;background:#C97070;border-radius:2px 2px 4px 4px;opacity:0;transition:opacity .4s;pointer-events:none;z-index:1}
.sprite .mug::after{content:'';position:absolute;right:-3px;top:3px;width:3px;height:6px;border:1.5px solid #C97070;border-left:none;border-radius:0 4px 4px 0}
.sprite[data-form="work"] .desk{opacity:1}
.sprite[data-form="work"] .mug{opacity:1}

/* 任务面板 + 战斗面板（独立 DOM，自动切换） */
.panel{margin:4px 16px 6px;padding:6px 10px;background:rgba(255,255,255,.55);border:1px solid var(--line);border-radius:var(--r-lg);font-size:11px;line-height:1.5;transition:all .6s}
body.dark .panel{background:rgba(255,255,255,.04);border-color:var(--darkline);color:var(--darkink);border-radius:var(--r-md-d)}
.panel .row{display:flex;justify-content:space-between}
.panel .row span:first-child{opacity:.7}
.panel .sub{font-size:9px;opacity:.55;margin-top:1px}
.task-tag{display:inline-block;padding:1px 5px;border-radius:99px;font-size:8px;margin-right:3px;background:rgba(217,163,122,.18);color:var(--accent)}
body.dark .task-tag{background:rgba(151,184,216,.2);color:var(--cool)}

.actions{display:flex;gap:6px;padding:6px 14px 10px;border-top:1px dashed var(--line);background:inherit;transition:border-color .6s}
body.dark .actions{border-color:var(--darkline)}
.btn{flex:1;border:1px solid var(--line);background:rgba(255,255,255,.6);color:var(--ink);font:inherit;font-size:11px;padding:8px 6px;border-radius:var(--r-lg);cursor:pointer;transition:transform .15s,background .2s,border-color .2s}
body.dark .btn{background:rgba(255,255,255,.05);color:var(--darkink);border-color:var(--darkline);border-radius:var(--r-md-d)}
.btn:active{transform:translateY(1px) scale(.98)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
body.dark .btn.primary{background:var(--cool);color:#0E1014;border-color:var(--cool)}

.roster{position:absolute;inset:0;background:inherit;z-index:50;display:none;flex-direction:column;padding:14px}
.roster.open{display:flex}
.roster h2{font-size:13px;letter-spacing:2px;margin-bottom:10px;opacity:.8}
.roster .grid{display:grid;grid-template-columns:1fr;gap:8px;overflow-y:auto;flex:1}
.card{display:grid;grid-template-columns:56px 1fr auto;gap:10px;align-items:center;padding:8px;border:1px solid var(--line);border-radius:var(--r-lg);cursor:pointer;background:rgba(255,255,255,.4);transition:transform .15s}
body.dark .card{background:rgba(255,255,255,.03);border-color:var(--darkline);border-radius:var(--r-md-d)}
.card:active{transform:scale(.98)}
.card .ava{width:56px;height:84px;border-radius:6px;position:relative;overflow:hidden;background:linear-gradient(180deg,var(--c1),var(--c2));display:flex;align-items:center;justify-content:center}
body.dark .card .ava{border-radius:var(--r-md-d)}
.card .ava img{width:100%;height:100%;object-fit:cover;display:block;image-rendering:pixelated}
.card .info h3{font-size:12px;margin-bottom:3px}
.card .info p{font-size:9px;opacity:.65;line-height:1.4}
.card .favor{font-size:10px;opacity:.7;text-align:right}
.card.active{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent) inset}
body.dark .card.active{border-color:var(--cool);box-shadow:0 0 0 2px var(--cool) inset}
.roster .close{padding:10px;text-align:center;cursor:pointer;border-top:1px dashed var(--line);font-size:11px;opacity:.7}

.modal{position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.modal.open{display:flex;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal .box{width:100%;max-width:360px;background:var(--bg);color:var(--ink);border:1px solid var(--line);border-radius:var(--r-lg);padding:18px;max-height:80vh;overflow-y:auto}
body.dark .modal .box{background:#0E1014;color:var(--darkink);border-color:var(--darkline);border-radius:var(--r-md-d)}
.modal h3{font-size:13px;letter-spacing:2px;margin-bottom:10px;opacity:.8}
.modal .list{font-size:12px;line-height:1.9}
.modal .list .item{display:flex;justify-content:space-between;border-bottom:1px dashed var(--line);padding:4px 0}
body.dark .modal .list .item{border-color:var(--darkline)}
.modal .item .delta.positive{color:#5C9A4A}
.modal .item .delta.negative{color:var(--danger)}
.modal .btn-row{display:flex;gap:8px;margin-top:14px}
.modal .btn-row .btn{flex:1}
.task-desc{font-size:12px;opacity:.8;line-height:1.6;margin:8px 0 12px;padding:8px 10px;background:rgba(0,0,0,.04);border-radius:8px;border-left:3px solid var(--accent)}
body.dark .task-desc{background:rgba(255,255,255,.04);border-left-color:var(--cool)}
.event-icon{font-size:24px;display:block;margin-bottom:6px}
.system-icon{font-size:32px;display:block;margin-bottom:8px;text-align:center}

.story{position:absolute;inset:0;z-index:110;background:rgba(0,0,0,.85);display:none;flex-direction:column;align-items:center;justify-content:center;padding:30px 24px;text-align:center}
.story.open{display:flex;animation:fadeIn .6s}
.story .text{font-size:14px;line-height:2;color:#E0D5C2;letter-spacing:1px;max-width:300px;opacity:0;animation:typeIn 1s .3s forwards}
@keyframes typeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.story .skip{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);font-size:11px;color:#999;letter-spacing:2px}

.toast{position:absolute;top:48px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);color:#fff;font-size:11px;padding:6px 14px;border-radius:99px;opacity:0;pointer-events:none;transition:opacity .3s;z-index:200;max-width:80%;text-align:center}
.toast.show{opacity:1}
.mode-stripe{position:absolute;left:0;right:0;top:0;height:3px;z-index:5;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0;transition:opacity .5s}
body.dark .mode-stripe{background:linear-gradient(90deg,transparent,var(--cool),transparent);opacity:1}
</style>
</head>
<body data-scene="work">
<div class="phone">
  <div class="mode-stripe"></div>
  <div class="status">
    <span id="clock">09:00</span>
    <span class="right"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>
  </div>
  <div class="bars">
    <div class="bar-row"><span class="label">体力</span><div class="bar"><i id="hpBar" style="width:80%"></i></div><span class="val" id="hpVal">80</span></div>
    <div class="bar-row"><span class="label">心情</span><div class="bar"><i id="moodBar" style="width:70%"></i></div><span class="val" id="moodVal">70</span></div>
    <div class="bar-row"><span class="label">压力</span><div class="bar pressure"><i id="pressureBar" style="width:15%"></i></div><span class="val" id="pressureVal">15</span></div>
    <div class="bar-row"><span class="label">疲劳</span><div class="bar tired"><i id="tiredBar" style="width:20%"></i></div><span class="val" id="tiredVal">20</span></div>
    <div class="bar-row"><span class="label">伤势</span><div class="bar injury"><i id="injuryBar" style="width:5%"></i></div><span class="val" id="injuryVal">5</span></div>
    <div class="bar-row"><span class="label">经验</span><div class="bar exp"><i id="expBar" style="width:0%"></i></div><span class="val lvl" id="expVal">Lv.1</span></div>
    <div class="bar-row"><span class="label">好感</span><div class="bar favor"><i id="favorBar" style="width:0%"></i></div><span class="val" id="favorVal">0</span></div>
  </div>
  <div class="stage">
    <div class="lvl-badge" id="lvlBadge">⚔ Lv.1</div>
    <div class="scene-tag" id="sceneTag">表世界 · 打工</div>
    <div class="task-badge" id="taskBadge" title="点击自动换任务">📋 行政</div>
    <div class="office-deco">
      <div class="doc doc-1" style="--r:-4deg"></div>
      <div class="doc doc-2" style="--r:3deg"></div>
      <div class="calendar">15<br>WED</div>
      <div class="note note-1" style="--r:-6deg"></div>
      <div class="note note-2" style="--r:8deg"></div>
    </div>
    <div class="dark-deco">
      <div class="vignette"></div>
      <div class="moon"></div>
      <div class="crack crack-1">✦</div>
      <div class="crack crack-2">✧</div>
      <div class="monster monster-1">👹</div>
      <div class="monster monster-2">👻</div>
      <div class="mist"></div>
    </div>
    <div class="sprite" id="sprite" data-form="work">
      <img id="spriteImg" src="images/sprite-wenwan-work.png" alt="立绘">
      <div class="desk"></div>
      <div class="mug"></div>
    </div>
  </div>
  <!-- 任务面板（仅表世界显示） -->
  <div class="panel" id="workPanel">
    <div class="row"><span>当前任务</span><span id="actName">整理周报</span></div>
    <div class="row"><span>进度</span><span id="actProg">0%</span></div>
    <div class="row"><span>状态</span><span id="actEta">专注推进中</span></div>
    <div class="sub" id="actLog">— 等待任务分发</div>
  </div>
  <!-- 战斗面板（仅里世界显示） -->
  <div class="panel" id="battlePanel" style="display:none">
    <div class="row"><span>战斗目标</span><span>暗影</span></div>
    <div class="row"><span>战斗进度</span><span id="battleProg">0%</span></div>
    <div class="row"><span>状态</span><span id="battleState">专注推进中</span></div>
    <div class="sub" id="battleLog">— 静默地清理阴影</div>
  </div>
  <div class="actions">
    <button class="btn" id="btnRoster">角色</button>
    <button class="btn" id="btnSettle">结算</button>
    <button class="btn primary" id="btnBoost">🍵 咖啡</button>
  </div>
</div>

<div class="roster" id="roster">
  <h2>选择角色</h2>
  <div class="grid" id="rosterGrid"></div>
  <div class="close" id="rosterClose">— 关闭 —</div>
</div>

<div class="modal" id="settleModal">
  <div class="box">
    <h3>离线结算</h3>
    <div class="list" id="settleList"></div>
    <div class="btn-row">
      <button class="btn" id="settleClose">关闭</button>
    </div>
  </div>
</div>

<div class="modal" id="eventModal">
  <div class="box">
    <h3 id="eventTitle">—</h3>
    <div class="task-desc" id="eventDesc">—</div>
    <div class="btn-row" id="eventChoices"></div>
  </div>
</div>

<div class="modal" id="sysModal">
  <div class="box" style="text-align:center">
    <div class="system-icon" id="sysIcon">⚠️</div>
    <h3 id="sysTitle">系统提示</h3>
    <div class="task-desc" id="sysDesc" style="text-align:left">—</div>
    <div class="btn-row" id="sysChoices"></div>
  </div>
</div>

<div class="modal" id="storyModal">
  <div class="box">
    <h3 id="storyListTitle">暗线剧情</h3>
    <div class="list" id="storyList"></div>
    <div class="btn-row">
      <button class="btn" id="storyListClose">关闭</button>
    </div>
  </div>
</div>

const PlayerData={selectedId:'wenwan',current:'work',progress:0,hp:80,mood:70,pressure:15,tired:20,injury:5,exp:0,favor:0,lastTick:Date.now(),lastEvent:Date.now(),lastHintCheck:Date.now(),lastHintKey:null,storySeen:{wenwan:0,luzhe:0,shenyu:0},boostUsed:0,currentTask:null,log:[],_taskCounter:0};

function cur(){return ROSTER[PlayerData.selectedId];}
function curTasks(){return TASKS[PlayerData.selectedId];}
function clamp(n,a,b){return Math.max(a,Math.min(b,n));}
function spriteUrl(id,form){return 'images/sprite-'+id+'-'+form+'.png';}
function pushLog(msg){const t=new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});PlayerData.log.unshift('['+t+'] '+msg);PlayerData.log=PlayerData.log.slice(0,4);}
function lvlFromExp(exp){return 1+Math.floor(exp/100);}

function applyFx(fx, opts){
  opts=opts||{};
  if(!fx)return;
  const r=cur().traits.moodEventResistance||1;
  if(fx.hp)PlayerData.hp=clamp(PlayerData.hp+fx.hp,0,100);
  if(fx.mood){
    let m=fx.mood*r;
    if(opts.moodEvent)m*=r;
    PlayerData.mood=clamp(PlayerData.mood+m,0,100);
  }
  if(fx.tired)PlayerData.tired=clamp(PlayerData.tired+fx.tired,0,100);
  if(fx.injury)PlayerData.injury=clamp(PlayerData.injury+fx.injury,0,100);
  if(fx.pressure)PlayerData.pressure=clamp(PlayerData.pressure+fx.pressure,0,100);
  if(fx.favor)PlayerData.favor=clamp(PlayerData.favor+fx.favor,0,100);
}
function applyMoodFloor(){
  const floor=cur().traits.moodFloor||0;
  if(floor>0&&PlayerData.mood<floor)PlayerData.mood=floor;
}

function pickTask(){
  const pool=curTasks();
  const candidates=pool.filter(t=>!PlayerData.currentTask||t.name!==PlayerData.currentTask.name);
  return candidates[Math.floor(Math.random()*candidates.length)];
}
function assignTask(task){
  PlayerData.currentTask=task;
  PlayerData.progress=0;
  pushLog('分配新任务：'+task.name);
  render();
  toast('📋 新任务：'+task.name);
}
function autoAssignTask(){
  if(!PlayerData.currentTask){const t=pickTask();assignTask(t);}
}

function maybeEvent(){
  if(PlayerData.current!=='work')return;
  const now=Date.now();
  if(now-PlayerData.lastEvent<30000)return;
  if(Math.random()>0.33)return;
  PlayerData.lastEvent=now;
  const ev=EVENTS[Math.floor(Math.random()*EVENTS.length)];
  showEvent(ev);
}
function showEvent(ev){
  document.getElementById('eventTitle').innerHTML='<span class="event-icon">'+ev.icon+'</span>'+ev.title;
  document.getElementById('eventDesc').textContent=ev.desc;
  document.getElementById('eventChoices').innerHTML=
    '<button class="btn danger" data-fx="left">'+ev.leftLbl+'</button>'+
    '<button class="btn" data-fx="right">'+ev.rightLbl+'</button>';
  Array.from(document.querySelectorAll('#eventChoices .btn')).forEach(btn=>{
    btn.onclick=function(){
      const fx=ev[this.getAttribute('data-fx')+'Fx'];
      applyFx(fx,{moodEvent:true});
      pushLog(ev.title+(this.getAttribute('data-fx')==='left'?' → '+ev.leftLbl:' → '+ev.rightLbl));
      document.getElementById('eventModal').classList.remove('open');
      applyMoodFloor();
      render();
    };
  });
  document.getElementById('eventModal').classList.add('open');
}

function checkSystemHints(){
  const now=Date.now();
  if(now-PlayerData.lastHintCheck<8000)return;
  for(const h of SYS_HINTS){
    try{
      if(h.when()&&PlayerData.lastHintKey!==h.title){
        PlayerData.lastHintCheck=now;
        PlayerData.lastHintKey=h.title;
        showSystemHint(h);
        return;
      }
    }catch(e){}
  }
  PlayerData.lastHintCheck=now;
}
function showSystemHint(h){
  document.getElementById('sysIcon').textContent=h.icon;
  document.getElementById('sysTitle').textContent=h.title;
  document.getElementById('sysDesc').textContent=h.desc;
  document.getElementById('sysChoices').innerHTML=h.choices.map((c,i)=>
    '<button class="btn '+(i===0?'primary':'')+'" data-idx="'+i+'">'+c.lbl+'</button>'
  ).join('');
  Array.from(document.querySelectorAll('#sysChoices .btn')).forEach(btn=>{
    btn.onclick=function(){
      const c=h.choices[this.getAttribute('data-idx')|0];
      applyFx(c.fx);
      if(c.action==='work')switchWorld('work','系统建议：撤回恢复');
      else if(c.action==='battle')switchWorld('battle','系统建议：状态好了，冲');
      pushLog('系统提示：'+h.title+' → '+c.lbl);
      document.getElementById('sysModal').classList.remove('open');
      PlayerData.lastHintKey=null;
      applyMoodFloor();
      render();
    };
  });
  document.getElementById('sysModal').classList.add('open');
}

function checkStory(){
  const c=cur(),seen=PlayerData.storySeen[c.id];
  if(PlayerData.favor>=30&&seen<1){PlayerData.storySeen[c.id]=1;showStory(c.story);}
  else if(PlayerData.favor>=60&&seen<2){PlayerData.storySeen[c.id]=2;showStory(c.story2);}
}

function WorldStateManager_tick(deltaSec){
  const c=cur(),inBattle=PlayerData.current==='battle',tr=c.traits;
  if(inBattle){
    PlayerData.progress=clamp(PlayerData.progress+deltaSec*(8*tr.battleDmg),0,100);
    PlayerData.tired=clamp(PlayerData.tired+deltaSec*(1.4*tr.fatigueRate),0,100);
    PlayerData.injury=clamp(PlayerData.injury+deltaSec*(0.6*tr.fatigueRate),0,100);
    PlayerData.mood=clamp(PlayerData.mood-deltaSec*(0.4*tr.fatigueRate),0,100);
    PlayerData.hp=clamp(PlayerData.hp-deltaSec*(0.3*tr.fatigueRate),0,100);
    PlayerData.pressure=clamp(PlayerData.pressure-deltaSec*(0.5*tr.battleDmg),0,100);
    if(PlayerData.progress>=100){
      PlayerData.progress=0;
      const expGain=Math.round(15*tr.battleExp);
      PlayerData.favor=clamp(PlayerData.favor+5,0,100);
      PlayerData.exp=clamp(PlayerData.exp+expGain,0,9999);
      pushLog('战斗结算 +5 好感 +'+expGain+' 经验');
    }
    if(PlayerData.tired>=80||PlayerData.injury>=60){switchWorld('work','太累了，回到表世界恢复');}
  }else{
    const task=PlayerData.currentTask;
    if(task){
      PlayerData.progress=clamp(PlayerData.progress+deltaSec*5*tr.workEff*task.baseRate,0,100);
      if(PlayerData.progress>=100){
        PlayerData.progress=0;
        const expGain=Math.round(task.exp*tr.workExp);
        PlayerData.exp=clamp(PlayerData.exp+expGain,0,9999);
        PlayerData.mood=clamp(PlayerData.mood+5,0,100);
        // ⭐ 任务完成 +1 好感（最直接的"打工提升好感"机制）
        PlayerData.favor=clamp(PlayerData.favor+1,0,100);
        pushLog(task.name+' 完成 +'+expGain+' 经验 +1 好感');
        PlayerData._taskCounter=(PlayerData._taskCounter||0)+1;
        if(PlayerData._taskCounter%3===0)PlayerData.pressure=clamp(PlayerData.pressure+8,0,100);
        setTimeout(()=>autoAssignTask(),300);
      }
    }
    PlayerData.hp=clamp(PlayerData.hp+deltaSec*1.5*tr.recover,0,100);
    PlayerData.mood=clamp(PlayerData.mood+deltaSec*1.0*tr.recover,0,100);
    PlayerData.tired=clamp(PlayerData.tired-deltaSec*1.5*tr.recover,0,100);
    PlayerData.injury=clamp(PlayerData.injury-deltaSec*0.8*tr.recover,0,100);
    PlayerData.pressure=clamp(PlayerData.pressure-deltaSec*0.2,0,100);
    if(task){
      const tf=deltaSec*0.3*tr.fatigueRate*task.tiredRate;
      const mf=deltaSec*0.1*task.moodRate;
      const pf=deltaSec*0.15*task.moodRate;
      PlayerData.tired=clamp(PlayerData.tired+tf,0,100);
      PlayerData.mood=clamp(PlayerData.mood-mf,0,100);
      PlayerData.pressure=clamp(PlayerData.pressure+pf,0,100);
    }
    if(tr.internalBurn){PlayerData.mood=clamp(PlayerData.mood-tr.internalBurn*deltaSec,0,100);}
    if(tr.workMoodPenalty&&task){PlayerData.mood=clamp(PlayerData.mood-tr.workMoodPenalty*deltaSec,0,100);}
    const ok=(PlayerData.tired<25)||(PlayerData.injury<25&&PlayerData.hp>70)||(PlayerData.mood>60&&PlayerData.tired<35);
    if(ok&&PlayerData.tired<35){switchWorld('battle','状态恢复了，悄悄回到里世界');}
  }
  applyMoodFloor();
  PlayerData.lastTick=Date.now();
  render();
  checkStory();
  maybeEvent();
  checkSystemHints();
}

function OfflineBattleManager(){
  const now=Date.now(),dt=Math.floor((now-PlayerData.lastTick)/1000);
  if(dt<10)return null;
  const before={hp:PlayerData.hp,mood:PlayerData.mood,pressure:PlayerData.pressure,tired:PlayerData.tired,injury:PlayerData.injury,exp:PlayerData.exp,favor:PlayerData.favor};
  const simSec=Math.min(dt,86400),step=60;
  for(let s=0;s<simSec;s+=step){WorldStateManager_tick(step);}
  return{elapsed:simSec,hp:PlayerData.hp-before.hp,mood:PlayerData.mood-before.mood,pressure:PlayerData.pressure-before.pressure,tired:PlayerData.tired-before.tired,injury:PlayerData.injury-before.injury,exp:PlayerData.exp-before.exp,favor:PlayerData.favor-before.favor};
}

function switchWorld(to,reason){
  if(PlayerData.current===to)return;
  PlayerData.current=to;
  const c=cur();
  pushLog(reason);
  toast(to==='battle'?(c.name+' 转入里世界'):(c.name+' 回到表世界'));
  if(to==='work'&&!PlayerData.currentTask){setTimeout(()=>autoAssignTask(),200);}
  render();
}

function render(){
  setBar('hp',PlayerData.hp);setBar('mood',PlayerData.mood);setBar('pressure',PlayerData.pressure);setBar('tired',PlayerData.tired);setBar('injury',PlayerData.injury);setBar('favor',PlayerData.favor);
  const expInLvl=PlayerData.exp%100;
  document.getElementById('expBar').style.width=expInLvl+'%';
  document.getElementById('expVal').textContent='Lv.'+lvlFromExp(PlayerData.exp);

  const c=cur();
  const inBattle=PlayerData.current==='battle';
  document.body.classList.toggle('dark',inBattle);
  document.body.dataset.scene=inBattle?'battle':'work';
  document.getElementById('sceneTag').textContent=inBattle?('里世界 · 战斗 · '+c.hidden):('表世界 · 打工 · '+c.surface);
  document.getElementById('lvlBadge').textContent='⚔ Lv.'+lvlFromExp(PlayerData.exp);
  document.getElementById('sprite').dataset.form=inBattle?'battle':'work';
  document.getElementById('spriteImg').src=spriteUrl(c.id,inBattle?'battle':'work');

  // 面板切换
  document.getElementById('workPanel').style.display=inBattle?'none':'block';
  document.getElementById('battlePanel').style.display=inBattle?'block':'none';

  const badge=document.getElementById('taskBadge');
  if(inBattle){badge.style.display='none';}
  else{
    badge.style.display='inline-block';
    const t=PlayerData.currentTask;
    if(t){const tn={admin:'📋 行政',project:'📊 项目',assist:'🤝 协作'};badge.textContent=tn[t.type];}
    else{badge.textContent='📋 待派';}
  }

  if(inBattle){
    // 战斗面板
    document.getElementById('battleProg').textContent=Math.floor(PlayerData.progress)+'%';
    if(PlayerData.tired>60)document.getElementById('battleState').textContent='⚠️ 快累垮了';
    else if(PlayerData.injury>50)document.getElementById('battleState').textContent='🩸 伤口渗血';
    else document.getElementById('battleState').textContent='专注推进中';
    document.getElementById('battleLog').textContent=PlayerData.log[0]||'— 静默地清理阴影';
  }else{
    // 任务面板
    const t=PlayerData.currentTask;
    if(t){
      document.getElementById('actName').innerHTML='<span class="task-tag">'+({admin:'行政',project:'项目',assist:'协作'})[t.type]+'</span>'+t.name;
      document.getElementById('actProg').textContent=Math.floor(PlayerData.progress)+'% · 距 Lv.'+(lvlFromExp(PlayerData.exp)+1)+' 经验 '+(100-expInLvl);
      if(PlayerData.tired>70)document.getElementById('actEta').textContent='⚠️ 快累垮了';
      else if(PlayerData.pressure>70)document.getElementById('actEta').textContent='💢 压力爆表';
      else if(PlayerData.mood<40)document.getElementById('actEta').textContent='😔 心情压抑';
      else if(PlayerData.tired>50)document.getElementById('actEta').textContent='有点疲劳';
      else document.getElementById('actEta').textContent='专注推进中';
      document.getElementById('actLog').textContent=PlayerData.log[0]||('— '+t.desc);
    }else{
      document.getElementById('actName').textContent='— 待派 —';
      document.getElementById('actProg').textContent='0%';
      document.getElementById('actEta').textContent='系统即将派发';
      document.getElementById('actLog').textContent='— 等待任务';
    }
  }
  const now=new Date();
  document.getElementById('clock').textContent=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
}

function setBar(name,val){const v=Math.round(val);document.getElementById(name+'Bar').style.width=v+'%';document.getElementById(name+'Val').textContent=v;}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(function(){t.classList.remove('show');},1800);}

function showSettle(){
  const r=OfflineBattleManager();
  const list=document.getElementById('settleList');
  if(!r){list.innerHTML='<div class="item"><span>刚刚才结算过</span><span>—</span></div>';}
  else{
    const m=r,fmt=function(n){return n===0?'—':'<span class="delta '+(n>0?'positive':'negative')+'">'+(n>0?'+':'')+Math.round(n)+'</span>';};
    list.innerHTML='<div class="item"><span>离线时长</span><span>'+Math.floor(m.elapsed/60)+' 分钟</span></div>'+
      '<div class="item"><span>体力</span>'+fmt(m.hp)+'</div>'+
      '<div class="item"><span>心情</span>'+fmt(m.mood)+'</div>'+
      '<div class="item"><span>压力</span>'+fmt(m.pressure)+'</div>'+
      '<div class="item"><span>疲劳</span>'+fmt(m.tired)+'</div>'+
      '<div class="item"><span>伤势</span>'+fmt(m.injury)+'</div>'+
      '<div class="item"><span>经验</span>'+fmt(m.exp)+' <span style="opacity:.6">→ Lv.'+lvlFromExp(PlayerData.exp)+'</span></div>'+
      '<div class="item"><span>好感</span>'+fmt(m.favor)+'</div>';
  }
  document.getElementById('settleModal').classList.add('open');
}

function showStory(text){const el=document.getElementById('story');document.getElementById('storyText').textContent=text;el.classList.add('open');setTimeout(function(){el.classList.remove('open');},5500);el.onclick=function(){el.classList.remove('open');};}

function showStoryList(){
  const c=cur();
  const seen=PlayerData.storySeen[c.id];
  const list=document.getElementById('storyList');
  document.getElementById('storyListTitle').textContent=c.name+' · 暗线剧情';
  list.innerHTML=
    '<div class="item" style="cursor:pointer" data-idx="1"><span>① 第一段：温柔都是伪装</span><span>'+(seen>=1?'✅ 已解锁':'🔒 好感 30 解锁')+'</span></div>'+
    '<div class="item" style="cursor:pointer" data-idx="2"><span>② 第二段：白天的力气</span><span>'+(seen>=2?'✅ 已解锁':'🔒 好感 60 解锁')+'</span></div>';
  Array.from(list.querySelectorAll('.item')).forEach(it=>{
    it.onclick=function(){
      const idx=this.getAttribute('data-idx')|0;
      if(PlayerData.storySeen[c.id]>=idx){
        document.getElementById('storyModal').classList.remove('open');
        showStory(idx===1?c.story:c.story2);
      }else{
        toast('🔒 好感度还没到，还差 '+(idx===1?30:60-PlayerData.favor)+' 点');
      }
    };
  });
  document.getElementById('storyModal').classList.add('open');
}
document.getElementById('storyListClose').onclick=function(){document.getElementById('storyModal').classList.remove('open');};

function openRoster(){
  const grid=document.getElementById('rosterGrid');grid.innerHTML='';
  Object.values(ROSTER).forEach(function(c){
    const card=document.createElement('div');
    card.className='card'+(c.id===PlayerData.selectedId?' active':'');
    const seen=PlayerData.storySeen[c.id];
    const fav=seen>=2?'🔓 双段剧情':seen>=1?'🔓 第一段':'🔒 待解锁';
    card.innerHTML='<div class="ava"><img src="'+spriteUrl(c.id,'work')+'" alt=""></div>'+
      '<div class="info"><h3>'+c.name+' <span style="opacity:.5;font-size:9px">'+c.surface+'</span></h3><p>'+c.bio+'</p></div>'+
      '<div class="favor">'+fav+'<br>好感 '+PlayerData.favor+'</div>';
    card.onclick=function(){
      PlayerData.selectedId=c.id;PlayerData.progress=0;PlayerData.current='work';PlayerData.currentTask=null;
      toast('已切换：'+c.name);setTimeout(()=>autoAssignTask(),300);render();closeRoster();
      setTimeout(()=>showStoryList(),350);
    };
    grid.appendChild(card);
  });
  document.getElementById('roster').classList.add('open');
}
function closeRoster(){document.getElementById('roster').classList.remove('open');}

document.getElementById('btnRoster').onclick=openRoster;
document.getElementById('rosterClose').onclick=closeRoster;
document.getElementById('taskBadge').onclick=function(){const t=pickTask();assignTask(t);};
document.getElementById('btnSettle').onclick=showSettle;
document.getElementById('settleClose').onclick=function(){document.getElementById('settleModal').classList.remove('open');};
document.getElementById('btnBoost').onclick=function(){
  if(PlayerData.boostUsed>=3){toast('今天咖啡额度用完了');return;}
  PlayerData.boostUsed++;
  PlayerData.mood=clamp(PlayerData.mood+12,0,100);
  PlayerData.tired=clamp(PlayerData.tired-8,0,100);
  PlayerData.pressure=clamp(PlayerData.pressure-5,0,100);
  applyMoodFloor();
  toast('☕ 喝完心情好了一点点');
  pushLog('咖啡时间，心情 +12，疲劳 -8，压力 -5');
  render();
};

let lastLoop=Date.now();
setInterval(function(){const now=Date.now(),dt=(now-lastLoop)/1000;lastLoop=now;WorldStateManager_tick(dt);},1000);

/* 前后台监听：标签页切走时记录切走时间，回来时也走离线结算 */
let hiddenAt=null;
document.addEventListener('visibilitychange',function(){
  if(document.hidden){hiddenAt=Date.now();}
  else if(hiddenAt){
    const hiddenSec=Math.floor((Date.now()-hiddenAt)/1000);
    if(hiddenSec>10){
      toast('📱 回来了，离线 '+Math.floor(hiddenSec/60)+' 分钟');
      // 重新结算（用 lastTick 到现在的 dt）
      const dt=Math.floor((Date.now()-PlayerData.lastTick)/1000);
      if(dt>10){
        const before={hp:PlayerData.hp,mood:PlayerData.mood,pressure:PlayerData.pressure,tired:PlayerData.tired,injury:PlayerData.injury,exp:PlayerData.exp,favor:PlayerData.favor};
        const simSec=Math.min(dt,86400),step=60;
        for(let s=0;s<simSec;s+=step){WorldStateManager_tick(step);}
        toast('✅ 结算完成（'+(PlayerData.exp-before.exp>0?'+'+PlayerData.exp-before.exp+' exp':'无变化')+'）');
      }
    }
    hiddenAt=null;
  }
});

PlayerData.lastTick=Date.now();
pushLog('新的一天开始了');
setTimeout(()=>autoAssignTask(),300);
render();
setTimeout(function(){toast('提示：v0.6 已对齐文档｜任务完成 +1 好感｜前后台切换会结算');},1200);
</script>
</body>
</html>
