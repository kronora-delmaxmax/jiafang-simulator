<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>双世界牛马养成 · 原型 v0.3</title>
<style>
:root{--bg:#F6F1E9;--bg2:#EFE6D8;--ink:#3A332B;--line:#D9CDB6;--accent:#D9A37A;--shadow:rgba(58,51,43,.08);--dark:#0E1014;--dark2:#1A1D24;--darkink:#C5CDD9;--darkline:#2A2F3A;--danger:#A83C3C;--cool:#97B8D8}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'PingFang SC',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--ink);overflow:hidden;user-select:none;-webkit-user-select:none;transition:background .6s ease,color .6s ease}
body.dark{background:var(--dark);color:var(--darkink)}
.phone{position:relative;margin:0 auto;width:100%;max-width:420px;height:100vh;max-height:920px;background:inherit;overflow:hidden;display:flex;flex-direction:column}
.status{flex:0 0 36px;display:flex;justify-content:space-between;align-items:center;padding:0 18px;font-size:12px;letter-spacing:1px;border-bottom:1px solid var(--line);background:inherit;transition:border-color .6s}
body.dark .status{border-color:var(--darkline)}
.status .right{display:flex;gap:6px;align-items:center}
.dot{width:6px;height:6px;background:currentColor;border-radius:50%}
.bars{flex:0 0 auto;padding:10px 14px 6px;background:inherit;border-bottom:1px dashed var(--line);transition:border-color .6s}
body.dark .bars{border-color:var(--darkline)}
.bar-row{display:grid;grid-template-columns:42px 1fr 30px;align-items:center;gap:8px;margin:3px 0;font-size:11px}
.bar-row .label{opacity:.7}
.bar{height:8px;background:rgba(0,0,0,.08);border-radius:4px;overflow:hidden;position:relative}
body.dark .bar{background:rgba(255,255,255,.06)}
.bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),#E8C39B);transition:width .5s ease}
body.dark .bar > i{background:linear-gradient(90deg,var(--cool),#5C7691)}
.bar.fatigue > i{background:linear-gradient(90deg,#B89A6F,#7A5C3A)}
.bar.injury > i{background:linear-gradient(90deg,#C97070,#7A2A2A)}
body.dark .bar.injury > i{background:linear-gradient(90deg,var(--danger),#5C1A1A)}
.bar.favor > i{background:linear-gradient(90deg,#E89BB1,#B95A78)}
.bar.exp > i{background:linear-gradient(90deg,#A8C5E8,#6A8FB8)}
.val{text-align:right;font-size:10px;opacity:.6}
.stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;position:relative;padding:12px 16px 4px;min-height:0}
.scene-tag{position:absolute;top:8px;left:50%;transform:translateX(-50%);font-size:10px;letter-spacing:2px;padding:3px 10px;border:1px solid var(--line);border-radius:99px;background:rgba(255,255,255,.4);transition:all .6s}
body.dark .scene-tag{border-color:var(--darkline);background:rgba(0,0,0,.3);color:var(--darkink)}
.task-badge{position:absolute;top:36px;right:14px;font-size:10px;padding:3px 8px;border-radius:99px;background:rgba(255,255,255,.6);border:1px solid var(--line);color:var(--ink);transition:all .6s}
body.dark .task-badge{border-color:var(--darkline);background:rgba(0,0,0,.4);color:var(--darkink)}
.sprite{width:200px;height:260px;position:relative;display:flex;align-items:flex-end;justify-content:center;image-rendering:pixelated}
.sprite img{width:100%;height:100%;object-fit:contain;display:block;transition:filter .4s,transform .4s}
.sprite[data-form="work"] img{transform:translateY(10px) scale(.94);filter:brightness(1.02) saturate(.92)}
.sprite[data-form="battle"] img{transform:translateY(0) scale(1);filter:brightness(.92) contrast(1.08)}
.sprite .desk{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:220px;height:30px;background:var(--bg2);border-radius:6px 6px 0 0;box-shadow:0 4px 0 rgba(0,0,0,.05);opacity:0;transition:opacity .4s;pointer-events:none}
body.dark .sprite .desk{background:#15181F;box-shadow:0 4px 0 rgba(0,0,0,.5)}
.sprite .mug{position:absolute;bottom:30px;right:30px;width:16px;height:18px;background:#C97070;border-radius:2px 2px 4px 4px;opacity:0;transition:opacity .4s;pointer-events:none}
.sprite .mug::after{content:'';position:absolute;right:-5px;top:4px;width:5px;height:8px;border:2px solid #C97070;border-left:none;border-radius:0 4px 4px 0}
.sprite[data-form="work"] .desk{opacity:1}
.sprite[data-form="work"] .mug{opacity:1}
.activity{margin:6px 16px 8px;padding:8px 12px;background:rgba(255,255,255,.55);border:1px solid var(--line);border-radius:10px;font-size:12px;line-height:1.6;transition:all .6s}
body.dark .activity{background:rgba(255,255,255,.04);border-color:var(--darkline);color:var(--darkink)}
.activity .row{display:flex;justify-content:space-between}
.activity .row span:first-child{opacity:.7}
.activity .sub{font-size:10px;opacity:.55;margin-top:2px}
.task-tag{display:inline-block;padding:1px 6px;border-radius:99px;font-size:9px;margin-right:4px;background:rgba(217,163,122,.18);color:var(--accent)}
body.dark .task-tag{background:rgba(151,184,216,.2);color:var(--cool)}
.actions{display:flex;gap:8px;padding:8px 14px 12px;border-top:1px dashed var(--line);background:inherit;transition:border-color .6s}
body.dark .actions{border-color:var(--darkline)}
.btn{flex:1;border:1px solid var(--line);background:rgba(255,255,255,.6);color:var(--ink);font:inherit;font-size:12px;padding:10px 8px;border-radius:10px;cursor:pointer;transition:transform .15s,background .2s,border-color .2s}
.btn:active{transform:translateY(1px) scale(.98)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.danger{background:rgba(168,60,60,.12);color:var(--danger);border-color:rgba(168,60,60,.3)}
body.dark .btn{background:rgba(255,255,255,.05);color:var(--darkink);border-color:var(--darkline)}
body.dark .btn.primary{background:var(--cool);color:#0E1014;border-color:var(--cool)}
body.dark .btn.danger{background:rgba(168,60,60,.18);color:#E89090;border-color:rgba(168,60,60,.4)}
.roster{position:absolute;inset:0;background:inherit;z-index:50;display:none;flex-direction:column;padding:14px}
.roster.open{display:flex}
.roster h2{font-size:14px;letter-spacing:2px;margin-bottom:14px;opacity:.8}
.roster .grid{display:grid;grid-template-columns:1fr;gap:10px;overflow-y:auto;flex:1}
.card{display:grid;grid-template-columns:64px 1fr auto;gap:12px;align-items:center;padding:10px;border:1px solid var(--line);border-radius:12px;cursor:pointer;background:rgba(255,255,255,.4);transition:transform .15s}
.card:active{transform:scale(.98)}
.card .ava{width:64px;height:80px;border-radius:8px;position:relative;overflow:hidden;background:linear-gradient(180deg,var(--c1),var(--c2));display:flex;align-items:center;justify-content:center}
.card .ava img{width:100%;height:100%;object-fit:cover;display:block}
.card .info h3{font-size:13px;margin-bottom:4px}
.card .info p{font-size:10px;opacity:.65;line-height:1.5}
.card .favor{font-size:11px;opacity:.7;text-align:right}
.card.active{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent) inset}
body.dark .card{background:rgba(255,255,255,.03);border-color:var(--darkline)}
body.dark .card.active{border-color:var(--cool);box-shadow:0 0 0 2px var(--cool) inset}
.roster .close{padding:12px;text-align:center;cursor:pointer;border-top:1px dashed var(--line);font-size:12px;opacity:.7}
.modal{position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.modal.open{display:flex;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal .box{width:100%;max-width:360px;background:var(--bg);color:var(--ink);border:1px solid var(--line);border-radius:14px;padding:18px;max-height:80vh;overflow-y:auto}
body.dark .modal .box{background:#0E1014;color:var(--darkink);border-color:var(--darkline)}
.modal h3{font-size:13px;letter-spacing:2px;margin-bottom:10px;opacity:.8}
.modal .list{font-size:12px;line-height:1.9}
.modal .list .item{display:flex;justify-content:space-between;border-bottom:1px dashed var(--line);padding:4px 0}
body.dark .modal .list .item{border-color:var(--darkline)}
.modal .item .delta.positive{color:#5C9A4A}
.modal .item .delta.negative{color:var(--danger)}
.modal .btn-row{display:flex;gap:8px;margin-top:14px}
.modal .btn-row .btn{flex:1}
.task-desc{font-size:12px;opacity:.75;line-height:1.6;margin:8px 0 12px;padding:8px 10px;background:rgba(0,0,0,.04);border-radius:8px;border-left:3px solid var(--accent)}
body.dark .task-desc{background:rgba(255,255,255,.04);border-left-color:var(--cool)}
.event-icon{font-size:24px;display:block;margin-bottom:6px}
.story{position:absolute;inset:0;z-index:110;background:rgba(0,0,0,.85);display:none;flex-direction:column;align-items:center;justify-content:center;padding:30px 24px;text-align:center}
.story.open{display:flex;animation:fadeIn .6s}
.story .text{font-size:14px;line-height:2;color:#E0D5C2;letter-spacing:1px;max-width:300px;opacity:0;animation:typeIn 1s .3s forwards}
@keyframes typeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.story .skip{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);font-size:11px;color:#999;letter-spacing:2px}
.toast{position:absolute;top:60px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);color:#fff;font-size:11px;padding:6px 14px;border-radius:99px;opacity:0;pointer-events:none;transition:opacity .3s;z-index:200;max-width:80%;text-align:center}
.toast.show{opacity:1}
.mode-stripe{position:absolute;left:0;right:0;top:0;height:3px;z-index:5;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0;transition:opacity .5s}
body.dark .mode-stripe{background:linear-gradient(90deg,transparent,var(--cool),transparent);opacity:1}
</style>
</head>
<body>
<div class="phone">
  <div class="mode-stripe"></div>
  <div class="status">
    <span id="clock">09:00</span>
    <span class="right"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>
  </div>
  <div class="bars">
    <div class="bar-row"><span class="label">体力</span><div class="bar"><i id="hpBar" style="width:80%"></i></div><span class="val" id="hpVal">80</span></div>
    <div class="bar-row"><span class="label">心情</span><div class="bar"><i id="moodBar" style="width:70%"></i></div><span class="val" id="moodVal">70</span></div>
    <div class="bar-row"><span class="label">疲劳</span><div class="bar fatigue"><i id="tiredBar" style="width:20%"></i></div><span class="val" id="tiredVal">20</span></div>
    <div class="bar-row"><span class="label">伤势</span><div class="bar injury"><i id="injuryBar" style="width:5%"></i></div><span class="val" id="injuryVal">5</span></div>
    <div class="bar-row"><span class="label">经验</span><div class="bar exp"><i id="expBar" style="width:0%"></i></div><span class="val" id="expVal">0</span></div>
    <div class="bar-row"><span class="label">好感</span><div class="bar favor"><i id="favorBar" style="width:0%"></i></div><span class="val" id="favorVal">0</span></div>
  </div>
  <div class="stage">
    <div class="scene-tag" id="sceneTag">表世界 · 打工</div>
    <div class="task-badge" id="taskBadge">📋 行政</div>
    <div class="sprite" id="sprite" data-form="work">
      <img id="spriteImg" src="images/sprite-wenwan-work.jpg" alt="立绘">
      <div class="desk"></div>
      <div class="mug"></div>
    </div>
  </div>
  <div class="activity">
    <div class="row"><span>当前任务</span><span id="actName">整理周报</span></div>
    <div class="row"><span>进度</span><span id="actProg">0%</span></div>
    <div class="row"><span>状态</span><span id="actEta">安静地推进</span></div>
    <div class="sub" id="actLog">— 安静地工作着</div>
  </div>
  <div class="actions">
    <button class="btn" id="btnRoster">角色</button>
    <button class="btn" id="btnTask">换任务</button>
    <button class="btn" id="btnSettle">离线结算</button>
    <button class="btn primary" id="btnBoost">🍵 咖啡</button>
  </div>
</div>

<div class="roster" id="roster">
  <h2>选择角色</h2>
  <div class="grid" id="rosterGrid"></div>
  <div class="close" id="rosterClose">— 关闭 —</div>
</div>

<div class="modal" id="taskModal">
  <div class="box">
    <h3 id="taskTitle">分配新任务</h3>
    <div class="task-desc" id="taskDesc">—</div>
    <div class="btn-row" id="taskChoices"></div>
  </div>
</div>

<div class="modal" id="settleModal">
  <div class="box">
    <h3>离线结算</h3>
    <div class="list" id="settleList"></div>
    <div class="btn-row">
      <button class="btn" id="settleClose">关闭</button>
    </div>
  </div>
</div>

<div class="modal" id="eventModal">
  <div class="box">
    <h3 id="eventTitle">—</h3>
    <div class="task-desc" id="eventDesc">—</div>
    <div class="btn-row" id="eventChoices"></div>
  </div>
</div>

<div class="story" id="story">
  <div class="text" id="storyText"></div>
  <div class="skip">— 点击任意处关闭 —</div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================
 * 任务池：每角色 6 个，3 类（行政/项目/协作）
 * type: admin / project / assist
 * 每个任务含：name, desc, exp, baseRate, tiredRate, moodRate
 * 文档依据：温晚=文职助理（周报/会议纪要/资料整理等）
 *         陆则=资深骨干（方案/汇报/协调/复盘等）
 *         沈逾=职场新人（协助/打杂/记录/外勤等）
 * ============================================ */
const TASKS={
  wenwan:[
    {type:'admin',name:'整理部门周报',desc:'把 7 个组的周报汇总成一份大周报，要 17:00 前交到王总桌上。',exp:8,baseRate:1.1,tiredRate:0.7,moodRate:0.5},
    {type:'admin',name:'会议纪要',desc:'上午的跨部门协调会，2 小时录音，整理成纪要分发给 5 个部门。',exp:10,baseRate:0.9,tiredRate:0.8,moodRate:0.4},
    {type:'admin',name:'资料归档',desc:'上月结案的 12 个项目档案，按编号录入系统并扫描备份。',exp:6,baseRate:1.3,tiredRate:0.5,moodRate:0.3},
    {type:'project',name:'协助项目排期',desc:'帮陆则更新项目甘特图，把 3 个延期节点标红并备注原因。',exp:12,baseRate:1.0,tiredRate:0.6,moodRate:0.6},
    {type:'project',name:'客户反馈整理',desc:'把上周客户微信群里的 47 条反馈按"功能/UI/服务"分类，做成表格。',exp:9,baseRate:1.0,tiredRate:0.7,moodRate:0.5},
    {type:'assist',name:'帮新人带路',desc:'带刚入职的沈逾熟悉公司环境，去 8 个部门打招呼领工牌。',exp:5,baseRate:1.4,tiredRate:0.3,moodRate:0.8},
  ],
  luzhe:[
    {type:'project',name:'推进项目方案',desc:'A 项目的 v2 方案客户周五要，必须今天出框架，明早补细节。',exp:14,baseRate:1.0,tiredRate:0.9,moodRate:0.4},
    {type:'project',name:'跨部门协调会',desc:'拉上 4 个部门对 B 项目需求做二次对齐，每个部门只能给 15 分钟。',exp:13,baseRate:0.8,tiredRate:1.0,moodRate:0.3},
    {type:'project',name:'季度复盘报告',desc:'Q2 收尾，要从 6 个维度写 20 页复盘 PPT，还要做数据可视化。',exp:16,baseRate:0.7,tiredRate:1.1,moodRate:0.2},
    {type:'admin',name:'审核下属周报',desc:'温晚汇总的周报需要你过目，给 7 个组分别写一句话反馈。',exp:8,baseRate:1.2,tiredRate:0.5,moodRate:0.6},
    {type:'admin',name:'财务对账',desc:'本月报销单 23 张，每张都要核验发票真伪和金额。',exp:10,baseRate:1.0,tiredRate:0.6,moodRate:0.4},
    {type:'assist',name:'给新人示范',desc:'沈逾不会用内部系统，你得带着他跑一遍完整流程，演示 3 个核心模块。',exp:7,baseRate:1.2,tiredRate:0.4,moodRate:0.7},
  ],
  shenyu:[
    {type:'assist',name:'跑腿送文件',desc:'把 5 份文件分别送到 5 个部门，每份都要等对方签收。',exp:5,baseRate:1.5,tiredRate:0.2,moodRate:0.7},
    {type:'assist',name:'会议记录',desc:'陆则的协调会你做记录，要实时记下每个部门的承诺。',exp:7,baseRate:1.3,tiredRate:0.4,moodRate:0.6},
    {type:'assist',name:'整理会议室',desc:'3 个会议室用完后都要恢复原样，投影仪、桌椅、白板笔。',exp:4,baseRate:1.6,tiredRate:0.2,moodRate:0.6},
    {type:'admin',name:'复印装订',desc:'50 份标书要复印装订，下午客户来取。',exp:6,baseRate:1.4,tiredRate:0.4,moodRate:0.5},
    {type:'admin',name:'录入新员工信息',desc:'HR 系统录入 3 个新同事的 20 项基本信息，一个都不能错。',exp:8,baseRate:1.2,tiredRate:0.5,moodRate:0.5},
    {type:'project',name:'参与方案脑暴',desc:'被拉进 A 项目组开会，大家讨论你来记录，结束时给一句话总结。',exp:10,baseRate:1.1,tiredRate:0.5,moodRate:0.6},
  ],
};

/* ============================================
 * 随机事件池（打工人日常会遇到的）
 * 1/3 概率每 30 秒触发一次
 * ============================================ */
const EVENTS=[
  {icon:'💬',title:'同事小张的私聊',desc:'"王总让你顺便把下个月的策划案也出了。"',left:'默默接下',right:'婉拒——超出职责',
   leftFx:{mood:-5,tired:8},rightFx:{mood:2},leftLbl:'多一事',rightLbl:'守住边界',rare:false},
  {icon:'☕',title:'前台请客',desc:'前台小妹今天生日，请全组喝奶茶。',left:'开心去蹭',right:'忙到没空',

  {icon:'📞',title:'王总突然来电',desc:'"那个方案，方向再想想，5 点前给我。"',left:'深呼吸接受',right:'列需求清单再回',

   leftFx:{mood:6},rightFx:{mood:-3},leftLbl:'不藏私',rightLbl:'低调',rare:false},
  {icon:'🖥️',title:'系统崩了',desc:'内部 OA 系统挂了，所有流程都卡在审批。',left:'等系统恢复',right:'手动跑腿',
   leftFx:{mood:-4,tired:5},rightFx:{mood:2,tired:8},leftLbl:'躺平等',rightLbl:'自己跑',rare:false},
  {icon:'🤒',title:'身体小信号',desc:'肩膀有点僵，眼睛有点酸。',left:'起身活动',right:'继续死撑',
   leftFx:{tired:-5,mood:2},rightFx:{tired:8,injury:3},leftLbl:'爱自己',rightLbl:'硬扛',rare:false},
  {icon:'💡',title:'同事提了个好点子',desc:'你正在做的东西，隔壁同事给了个能省一半时间的建议。',left:'大方采用',right:'按原计划走',
   leftFx:{mood:5},rightFx:{mood:-2},leftLbl:'听人劝',rightLbl:'自己说了算',rare:false},
  {icon:'📦',title:'快递到了',desc:'你的快递被前台签收了，但前台很忙没空送上来。',left:'自己下去取',right:'晚上回家再说',
   leftFx:{mood:3,tired:3},rightFx:{mood:-2},leftLbl:'顺便活动',rightLbl:'明天再说',rare:false},
  {icon:'🌙',title:'加班到很晚',desc:'整个部门只剩你一个人，窗外夜色已深。',left:'再熬一会',right:'收工回家',
   leftFx:{tired:15,mood:-5},rightFx:{tired:-5,mood:3},leftLbl:'撑一撑',rightLbl:'见好就收',rare:true},
  {icon:'✨',title:'被王总点名表扬',desc:'"这次周报写得很清楚。"——微信群里，王总 @了你。',left:'默默收藏',right:'回复感谢',
   leftFx:{mood:6,favor:2},rightFx:{mood:8,favor:3},leftLbl:'内敛',rightLbl:'礼貌',rare:true},
];

/* ============================================
 * 数据层
 * ============================================ */
const ROSTER={
  wenwan:{id:'wenwan',name:'温晚',gender:'女',surface:'文职助理',hidden:'静默薄刃肃清者',bio:'温顺、耐心、讨好型。温柔都是伪装，习惯性自我压抑。',traits:{recover:1.4,fatigueRate:0.5,battleDmg:0.4,workEff:0.7},story:'……每次抬头笑的时候，我都觉得肩膀很重。其实我也不知道"乖"是什么形状，只是大家都这么说，我便学了下来。',story2:'夜里我才知道，自己能握稳刀。原来我并不是没力气，只是白天不允许自己用力。'},
  luzhe:{id:'luzhe',name:'陆则',gender:'男',surface:'资深骨干',hidden:'理性战术肃清者',bio:'冷静、高效、自律。所有靠谱，都是无数次自我消耗换来。',traits:{recover:1.0,fatigueRate:0.9,battleDmg:0.85,workEff:1.3},story:'我没崩溃过。也没真正撑住过。只是把每一次"撑住"重复了一万次。',story2:'独处的时候，才敢承认我也累。'},
  shenyu:{id:'shenyu',name:'沈逾',gender:'男',surface:'职场新人',hidden:'炽热偏执狂战士',bio:'阳光、鲜活、少年感。看似开朗，实则极度缺爱、自卑偏执。',traits:{recover:0.8,fatigueRate:1.6,battleDmg:1.6,workEff:0.9},story:'我笑得很用力，是因为真的怕——你看到我安静的样子，就不想再靠近了。',story2:'打起来的时候反而最轻松。原来只有在拼命的时候，才觉得被看见。'}
};

const PlayerData={selectedId:'wenwan',current:'work',progress:0,hp:80,mood:70,tired:20,injury:5,exp:0,favor:0,lastTick:Date.now(),lastEvent:Date.now(),storySeen:{wenwan:0,luzhe:0,shenyu:0},boostUsed:0,currentTask:null,log:[]};

function cur(){return ROSTER[PlayerData.selectedId];}
function curTasks(){return TASKS[PlayerData.selectedId];}
function clamp(n,a,b){return Math.max(a,Math.min(b,n));}
function spriteUrl(id,form){return 'images/sprite-'+id+'-'+form+'.jpg';}
function pushLog(msg){const t=new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});PlayerData.log.unshift('['+t+'] '+msg);PlayerData.log=PlayerData.log.slice(0,4);}

/* ============================================
 * 任务分发
 * ============================================ */
function pickTask(){
  const pool=curTasks();
  // 排除当前任务，避免重复
  const candidates=pool.filter(t=>!PlayerData.currentTask||t.name!==PlayerData.currentTask.name);
  return candidates[Math.floor(Math.random()*candidates.length)];
}

function assignTask(task){
  PlayerData.currentTask=task;
  PlayerData.progress=0;
  pushLog('分配新任务：'+task.name);
  render();
  toast('📋 新任务：'+task.name);
}

function showTaskPicker(){
  // 让用户在 2 个候选任务中选一个
  const pool=curTasks();
  const shuffled=pool.slice().sort(()=>Math.random()-0.5);
  const a=shuffled[0],b=shuffled[1];
  const typeName={admin:'📋 行政',project:'📊 项目',assist:'🤝 协作'};
  document.getElementById('taskTitle').textContent='分配新任务';
  document.getElementById('taskDesc').innerHTML=
    '<div style="margin-bottom:8px;">从下面选一个开始做（也可以等系统自动派）：</div>';
  document.getElementById('taskChoices').innerHTML=
    '<button class="btn" data-task="'+a.name+'"><div style="font-size:11px;opacity:.7;margin-bottom:2px;">'+typeName[a.type]+'</div><div style="font-weight:600;">'+a.name+'</div></button>'+
    '<button class="btn" data-task="'+b.name+'"><div style="font-size:11px;opacity:.7;margin-bottom:2px;">'+typeName[b.type]+'</div><div style="font-weight:600;">'+b.name+'</div></button>';
  // 取消选项
  document.getElementById('taskChoices').innerHTML+='<button class="btn" data-task="__cancel__" style="margin-top:8px;">暂不换</button>';
  Array.from(document.querySelectorAll('#taskChoices .btn')).forEach(btn=>{
    btn.onclick=function(){
      const name=this.getAttribute('data-task');
      document.getElementById('taskModal').classList.remove('open');
      if(name==='__cancel__')return;
      const task=pool.find(t=>t.name===name);
      if(task)assignTask(task);
    };
  });
  document.getElementById('taskModal').classList.add('open');
}

function autoAssignTask(){
  if(!PlayerData.currentTask){
    const t=pickTask();
    assignTask(t);
  }
}

/* ============================================
 * 随机事件
 * ============================================ */
function maybeEvent(){
  if(PlayerData.current!=='work')return;
  // 30 秒冷却 + 1/3 概率
  const now=Date.now();
  if(now-PlayerData.lastEvent<30000)return;
  if(Math.random()>0.33)return;
  PlayerData.lastEvent=now;
  const ev=EVENTS[Math.floor(Math.random()*EVENTS.length)];
  showEvent(ev);
}

function showEvent(ev){
  document.getElementById('eventTitle').innerHTML='<span class="event-icon">'+ev.icon+'</span>'+ev.title;
  document.getElementById('eventDesc').textContent=ev.desc;
  document.getElementById('eventChoices').innerHTML=
    '<button class="btn '+('danger')+'" data-fx="left">'+ev.leftLbl+'</button>'+
    '<button class="btn" data-fx="right">'+ev.rightLbl+'</button>';
  Array.from(document.querySelectorAll('#eventChoices .btn')).forEach(btn=>{
    btn.onclick=function(){
      const fx=this.getAttribute('data-fx');
      const delta=ev[fx+'Fx'];
      applyFx(delta);
      pushLog(ev.title+(fx==='left'?' → '+ev.leftLbl:' → '+ev.rightLbl));
      document.getElementById('eventModal').classList.remove('open');
      render();
    };
  });
  document.getElementById('eventModal').classList.add('open');
}

function applyFx(fx){
  if(!fx)return;
  if(fx.hp)PlayerData.hp=clamp(PlayerData.hp+fx.hp,0,100);
  if(fx.mood)PlayerData.mood=clamp(PlayerData.mood+fx.mood,0,100);
  if(fx.tired)PlayerData.tired=clamp(PlayerData.tired+fx.tired,0,100);
  if(fx.injury)PlayerData.injury=clamp(PlayerData.injury+fx.injury,0,100);
  if(fx.favor)PlayerData.favor=clamp(PlayerData.favor+fx.favor,0,100);
}

/* ============================================
 * 主循环
 * ============================================ */
function tick(deltaSec){
  const c=cur(),inBattle=PlayerData.current==='battle',tr=c.traits;
  if(inBattle){
    PlayerData.progress=clamp(PlayerData.progress+deltaSec*(8*tr.battleDmg),0,100);
    PlayerData.tired=clamp(PlayerData.tired+deltaSec*(1.4*tr.fatigueRate),0,100);
    PlayerData.injury=clamp(PlayerData.injury+deltaSec*(0.6*tr.fatigueRate),0,100);
    PlayerData.mood=clamp(PlayerData.mood-deltaSec*(0.4*tr.fatigueRate),0,100);
    PlayerData.hp=clamp(PlayerData.hp-deltaSec*(0.3*tr.fatigueRate),0,100);
    if(PlayerData.progress>=100){PlayerData.progress=0;PlayerData.favor=clamp(PlayerData.favor+5,0,100);pushLog('战斗结算 +5 好感');}
    if(PlayerData.tired>=80||PlayerData.injury>=60){switchWorld('work','太累了，回到表世界恢复');}
  }else{
    // 打工：按任务 type 算
    const task=PlayerData.currentTask;
    if(task){
      const baseDelta=deltaSec*5*tr.workEff*task.baseRate;
      PlayerData.progress=clamp(PlayerData.progress+baseDelta,0,100);
      // 任务完成 → +exp +心情恢复
      if(PlayerData.progress>=100){
        PlayerData.progress=0;
        PlayerData.exp=clamp(PlayerData.exp+task.exp,0,100);
        PlayerData.mood=clamp(PlayerData.mood+5,0,100);
        pushLog(task.name+' 完成 +'+task.exp+' 经验');
        // 自动派下一个
        setTimeout(()=>autoAssignTask(),300);
      }
    }
    PlayerData.hp=clamp(PlayerData.hp+deltaSec*(1.5*tr.recover),0,100);
    PlayerData.mood=clamp(PlayerData.mood+deltaSec*(1.0*tr.recover),0,100);
    PlayerData.tired=clamp(PlayerData.tired-deltaSec*(1.5*tr.recover),0,100);
    PlayerData.injury=clamp(PlayerData.injury-deltaSec*(0.8*tr.recover),0,100);
    // 应用任务疲劳/心情系数
    if(task){
      const tf=deltaSec*(0.3*tr.fatigueRate*task.tiredRate);
      const mf=deltaSec*(0.1*task.moodRate);
      PlayerData.tired=clamp(PlayerData.tired+tf,0,100);
      PlayerData.mood=clamp(PlayerData.mood-mf,0,100);
    }
    // 满状态 → 切里世界
    if(PlayerData.tired<25&&PlayerData.injury<25&&PlayerData.hp>70&&PlayerData.mood>60){switchWorld('battle','状态恢复了，悄悄回到里世界');}
  }
  PlayerData.lastTick=Date.now();
  render();
  checkStory();
  maybeEvent();
}

function switchWorld(to,reason){
  if(PlayerData.current===to)return;
  PlayerData.current=to;
  const c=cur();
  pushLog(reason);
  toast(to==='battle'?(c.name+' 转入里世界'):(c.name+' 回到表世界'));
  if(to==='work'&&!PlayerData.currentTask){
    // 回来时自动派任务
    setTimeout(()=>autoAssignTask(),200);
  }
  render();
}

function checkStory(){
  const c=cur(),seen=PlayerData.storySeen[c.id];
  if(PlayerData.favor>=30&&seen<1){PlayerData.storySeen[c.id]=1;showStory(c.story);}
  else if(PlayerData.favor>=60&&seen<2){PlayerData.storySeen[c.id]=2;showStory(c.story2);}
}

function calcOffline(){
  const now=Date.now(),dt=Math.floor((now-PlayerData.lastTick)/1000);
  if(dt<10)return null;
  const before={hp:PlayerData.hp,mood:PlayerData.mood,tired:PlayerData.tired,injury:PlayerData.injury,exp:PlayerData.exp,favor:PlayerData.favor};
  const simSec=Math.min(dt,8*3600),step=60;
  for(let s=0;s<simSec;s+=step){tick(step);}
  return{elapsed:simSec,hp:PlayerData.hp-before.hp,mood:PlayerData.mood-before.mood,tired:PlayerData.tired-before.tired,injury:PlayerData.injury-before.injury,exp:PlayerData.exp-before.exp,favor:PlayerData.favor-before.favor};
}

/* ============================================
 * 表现层
 * ============================================ */
function render(){
  setBar('hp',PlayerData.hp);setBar('mood',PlayerData.mood);setBar('tired',PlayerData.tired);setBar('injury',PlayerData.injury);setBar('exp',PlayerData.exp);setBar('favor',PlayerData.favor);
  const c=cur();
  const inBattle=PlayerData.current==='battle';
  document.body.classList.toggle('dark',inBattle);
  document.getElementById('sceneTag').textContent=inBattle?('里世界 · 战斗 · '+c.hidden):('表世界 · 打工 · '+c.surface);
  document.getElementById('sprite').dataset.form=inBattle?'battle':'work';
  document.getElementById('spriteImg').src=spriteUrl(c.id,inBattle?'battle':'work');
  // 任务徽章
  const badge=document.getElementById('taskBadge');
  if(inBattle){
    badge.style.display='none';
  }else{
    badge.style.display='inline-block';
    const t=PlayerData.currentTask;
    if(t){
      const typeName={admin:'📋 行政',project:'📊 项目',assist:'🤝 协作'};
      badge.textContent=typeName[t.type];
    }else{
      badge.textContent='📋 待派';
    }
  }
  // 活动面板
  const actName=document.getElementById('actName'),actProg=document.getElementById('actProg'),actEta=document.getElementById('actEta'),actLog=document.getElementById('actLog');
  if(inBattle){
    actName.textContent='对抗 · 暗影';
    actProg.textContent=Math.floor(PlayerData.progress)+'%';
    actEta.textContent=PlayerData.tired>60?'快累垮了':'继续推进';
    actLog.textContent=PlayerData.log[0]||'— 静默地清理阴影';
  }else{
    const t=PlayerData.currentTask;
    if(t){
      actName.innerHTML='<span class="task-tag">'+({admin:'行政',project:'项目',assist:'协作'})[t.type]+'</span>'+t.name;
      actProg.textContent=Math.floor(PlayerData.progress)+'%';
      // 状态文字：疲惫程度
      if(PlayerData.tired>70)actEta.textContent='⚠️ 快累垮了';
      else if(PlayerData.tired>50)actEta.textContent='有点疲劳';
      else if(PlayerData.mood<40)actEta.textContent='心情压抑';
      else actEta.textContent='专注推进中';
      actLog.textContent=PlayerData.log[0]||('— '+t.desc);
    }else{
      actName.textContent='— 待派 —';
      actProg.textContent='0%';
      actEta.textContent='系统即将派发';
      actLog.textContent='— 等待任务';
    }
  }
  const now=new Date();
  document.getElementById('clock').textContent=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
}

function setBar(name,val){const v=Math.round(val);document.getElementById(name+'Bar').style.width=v+'%';document.getElementById(name+'Val').textContent=v;}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(function(){t.classList.remove('show');},1800);}

function showSettle(){
  const r=calcOffline(),list=document.getElementById('settleList');
  if(!r){list.innerHTML='<div class="item"><span>刚刚才结算过</span><span>—</span></div>';}
  else{
    const m=r,fmt=function(n){return n===0?'—':'<span class="delta '+(n>0?'positive':'negative')+'">'+(n>0?'+':'')+Math.round(n)+'</span>';};
    list.innerHTML='<div class="item"><span>离线时长</span><span>'+Math.floor(m.elapsed/60)+' 分钟</span></div>'+'<div class="item"><span>体力</span>'+fmt(m.hp)+'</div>'+'<div class="item"><span>心情</span>'+fmt(m.mood)+'</div>'+'<div class="item"><span>疲劳</span>'+fmt(m.tired)+'</div>'+'<div class="item"><span>伤势</span>'+fmt(m.injury)+'</div>'+'<div class="item"><span>经验</span>'+fmt(m.exp)+'</div>'+'<div class="item"><span>好感</span>'+fmt(m.favor)+'</div>';
  }
  document.getElementById('settleModal').classList.add('open');
}

function showStory(text){const el=document.getElementById('story');document.getElementById('storyText').textContent=text;el.classList.add('open');setTimeout(function(){el.classList.remove('open');},5500);el.onclick=function(){el.classList.remove('open');};}

function openRoster(){
  const grid=document.getElementById('rosterGrid');grid.innerHTML='';
  Object.values(ROSTER).forEach(function(c){
    const card=document.createElement('div');
    card.className='card'+(c.id===PlayerData.selectedId?' active':'');
    const fav=PlayerData.storySeen[c.id]>=2?'🔓 双段剧情':PlayerData.storySeen[c.id]>=1?'🔓 第一段':'🔒 待解锁';
    card.innerHTML='<div class="ava"><img src="'+spriteUrl(c.id,'work')+'" alt=""></div><div class="info"><h3>'+c.name+' <span style="opacity:.5;font-size:10px">'+c.surface+'</span></h3><p>'+c.bio+'</p></div><div class="favor">'+fav+'<br>好感 '+PlayerData.favor+'</div>';
    card.onclick=function(){PlayerData.selectedId=c.id;PlayerData.progress=0;PlayerData.current='work';PlayerData.currentTask=null;toast('已切换：'+c.name);setTimeout(()=>autoAssignTask(),300);render();closeRoster();};
    grid.appendChild(card);
  });
  document.getElementById('roster').classList.add('open');
}
function closeRoster(){document.getElementById('roster').classList.remove('open');}

document.getElementById('btnRoster').onclick=openRoster;
document.getElementById('rosterClose').onclick=closeRoster;
document.getElementById('btnTask').onclick=showTaskPicker;
document.getElementById('btnSettle').onclick=showSettle;
document.getElementById('settleClose').onclick=function(){document.getElementById('settleModal').classList.remove('open');};
document.getElementById('btnBoost').onclick=function(){
  if(PlayerData.boostUsed>=3){toast('今天咖啡额度用完了');return;}
  PlayerData.boostUsed++;
  PlayerData.mood=clamp(PlayerData.mood+12,0,100);
  PlayerData.tired=clamp(PlayerData.tired-8,0,100);
  toast('☕ 喝完心情好了一点点');
  pushLog('咖啡时间，心情 +12，疲劳 -8');
  render();
};

let lastLoop=Date.now();
setInterval(function(){const now=Date.now(),dt=(now-lastLoop)/1000;lastLoop=now;tick(dt);},1000);

PlayerData.lastTick=Date.now();
pushLog('新的一天开始了');
setTimeout(()=>autoAssignTask(),300);
render();
setTimeout(function(){toast('提示：底部「换任务」可手动选｜打工人会随机遭遇事件');},1200);
</script>
