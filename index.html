<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>甲方模拟器 · 你能活到第几集？</title>
<style>
:root {
  --phone-w: 390px;
  --phone-h: 844px;
  --bubble-me: #007AFF;
  --bubble-them: #E9E9EB;
  --bg: #F2F2F7;
  --danger: #FF3B30;
  --success: #34C759;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh; background: #1a1a2e;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', sans-serif;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none; -webkit-user-select: none;
}

/* Phone Frame */
.phone {
  width: var(--phone-w); height: var(--phone-h);
  background: #000; border-radius: 44px;
  position: relative; overflow: hidden;
  box-shadow: 0 0 0 3px #1a1a1a, 0 0 0 6px #333, 0 20px 60px rgba(0,0,0,0.5);
}
@media (max-width: 420px) {
  .phone { width: 100vw; height: 100vh; border-radius: 0; box-shadow: none; }
}

/* Status Bar */
.status-bar {
  height: 54px; background: #000;
  display: flex; justify-content: space-between; align-items: flex-end;
  padding: 0 28px 8px; color: #fff; font-size: 12px; font-weight: 600;
  position: relative; z-index: 10;
}
.status-bar .time { font-size: 15px; font-weight: 700; }
.status-bar .icons { display: flex; gap: 6px; align-items: center; }
.notch {
  position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
  width: 120px; height: 30px; background: #000; border-radius: 0 0 20px 20px;
  z-index: 11;
}

/* Chat Header */
.chat-header {
  height: 50px; background: rgba(0,0,0,0.92);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  display: flex; align-items: center; padding: 0 16px;
  border-bottom: 0.5px solid rgba(255,255,255,0.15);
  position: relative; z-index: 5;
}
.chat-header .back { color: #007AFF; font-size: 16px; cursor: pointer; }
.chat-header .avatar {
  width: 34px; height: 34px; border-radius: 50%;
  background: linear-gradient(135deg, #FF6B35, #D32F2F);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-weight: 700; font-size: 14px; margin: 0 10px;
}
.chat-header .name { color: #fff; font-weight: 600; font-size: 16px; flex: 1; }
.chat-header .status { color: #34C759; font-size: 11px; display: block; font-weight: 400; }

/* Chat Area */
.chat-area {
  height: calc(100% - 54px - 50px);
  background: #000;
  overflow-y: auto; overflow-x: hidden;
  padding: 12px 16px 20px;
  display: flex; flex-direction: column;
  gap: 4px;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}
.chat-area::-webkit-scrollbar { display: none; }

/* Message Bubbles */
.msg-row { display: flex; flex-direction: column; animation: msgIn 0.35s ease-out; }
.msg-row.them { align-items: flex-start; }
.msg-row.me { align-items: flex-end; }
.msg-row.info { align-items: center; }

@keyframes msgIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

.msg-bubble {
  max-width: 78%; padding: 10px 14px; border-radius: 18px;
  font-size: 15px; line-height: 1.5; word-break: break-word;
  position: relative;
}
.msg-row.them .msg-bubble {
  background: #1C1C1E; color: #fff;
  border-bottom-left-radius: 4px;
}
.msg-row.me .msg-bubble {
  background: var(--bubble-me); color: #fff;
  border-bottom-right-radius: 4px;
}
.msg-row.info .msg-bubble {
  background: transparent; color: #8E8E93; font-size: 12px; text-align: center; max-width: 100%;
}

.msg-time {
  font-size: 11px; color: #8E8E93; margin: 2px 4px 0;
}
.msg-row.them .msg-time { text-align: left; }
.msg-row.me .msg-time { text-align: right; }

/* Voice message bubble */
.voice-bubble {
  display: flex; align-items: center; gap: 8px;
  background: #1C1C1E; padding: 10px 14px; border-radius: 18px;
  border-bottom-left-radius: 4px; cursor: pointer; max-width: 70%;
}
.voice-bubble .wave { display: flex; align-items: center; gap: 2px; }
.voice-bubble .wave span {
  width: 3px; background: #007AFF; border-radius: 2px;
  animation: wave 0.6s ease-in-out infinite;
}
.voice-bubble .wave span:nth-child(1) { height: 12px; animation-delay: 0s; }
.voice-bubble .wave span:nth-child(2) { height: 20px; animation-delay: 0.1s; }
.voice-bubble .wave span:nth-child(3) { height: 8px; animation-delay: 0.2s; }
.voice-bubble .wave span:nth-child(4) { height: 16px; animation-delay: 0.3s; }
.voice-bubble .dur { color: #8E8E93; font-size: 12px; }
@keyframes wave { 0%,100% { transform: scaleY(1); } 50% { transform: scaleY(0.4); } }

/* Typing Indicator */
.typing-indicator {
  display: flex; gap: 4px; padding: 12px 16px; align-items: center;
  animation: msgIn 0.2s ease-out;
}
.typing-indicator span {
  width: 7px; height: 7px; border-radius: 50%; background: #8E8E93;
  animation: typing 1.2s ease-in-out infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing { 0%,60%,100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-6px); opacity: 1; } }

/* Incoming Call Overlay */
.call-overlay {
  position: absolute; inset: 0; background: #0a0a0a;
  z-index: 50; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  animation: callIn 0.4s ease-out;
  display: none;
}
.call-overlay.active { display: flex; }
@keyframes callIn { from { transform: scale(1.2); opacity: 0; } to { transform: scale(1); opacity: 1; } }

.call-avatar {
  width: 90px; height: 90px; border-radius: 50%;
  background: linear-gradient(135deg, #FF6B35, #D32F2F);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 36px; font-weight: 700; margin-bottom: 16px;
  animation: callPulse 1.5s ease-in-out infinite;
}
@keyframes callPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(255,107,53,0.4); } 50% { box-shadow: 0 0 0 30px rgba(255,107,53,0); } }
.call-name { color: #fff; font-size: 28px; font-weight: 700; margin-bottom: 4px; }
.call-label { color: #8E8E93; font-size: 16px; margin-bottom: 40px; letter-spacing: 1px; }
.call-actions { display: flex; gap: 60px; }
.call-btn {
  width: 68px; height: 68px; border-radius: 50%; border: none;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: transform 0.2s;
}
.call-btn:active { transform: scale(0.9); }
.call-btn.decline { background: #FF3B30; }
.call-btn.accept { background: #34C759; }
.call-btn svg { width: 32px; height: 32px; fill: #fff; }
.call-btn-label { color: #fff; font-size: 13px; text-align: center; margin-top: 8px; }

/* Notification Banner */
.notification-banner {
  position: absolute; top: 54px; left: 0; right: 0; z-index: 40;
  background: rgba(28,28,30,0.97); backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 14px 16px; display: flex; align-items: center; gap: 12px;
  transform: translateY(-100%); transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1.2);
  border-bottom: 0.5px solid rgba(255,255,255,0.1);
}
.notification-banner.show { transform: translateY(0); }
.notif-icon {
  width: 20px; height: 28px; border-radius: 5px;
  background: linear-gradient(135deg, #FF6B35, #D32F2F);
  flex-shrink: 0;
}
.notif-content { flex: 1; min-width: 0; }
.notif-app { color: #8E8E93; font-size: 12px; }
.notif-text { color: #fff; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.notif-time { color: #8E8E93; font-size: 11px; flex-shrink: 0; }

/* Decision Card Overlay */
.decision-overlay {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 30;
  display: flex; flex-direction: column; align-items: center;
  padding: 0 16px 40px;
  pointer-events: none;
  opacity: 0; transition: opacity 0.3s;
}
.decision-overlay.active { opacity: 1; pointer-events: auto; }

.decision-card {
  width: 100%; background: rgba(28,28,30,0.98);
  backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
  border-radius: 20px; padding: 20px;
  border: 0.5px solid rgba(255,255,255,0.12);
  position: relative;
  transform: translateX(0) rotate(0deg);
  transition: transform 0.15s ease-out;
  cursor: grab;
}
.decision-card:active { cursor: grabbing; }
.decision-card.swiping { transition: none; }
.decision-card.swipe-left { transform: translateX(-120%) rotate(-15deg); opacity: 0; transition: all 0.3s ease-in; }
.decision-card.swipe-right { transform: translateX(120%) rotate(15deg); opacity: 0; transition: all 0.3s ease-in; }
.decision-card.snap-back { transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1); }

.decision-hint {
  text-align: center; color: #8E8E93; font-size: 12px;
  margin-bottom: 8px; letter-spacing: 2px;
}

.decision-prompt {
  color: #fff; font-size: 15px; text-align: center;
  margin-bottom: 20px; line-height: 1.5; font-weight: 500;
}

.decision-options {
  display: flex; gap: 12px; justify-content: space-between;
}
.decision-option {
  flex: 1; padding: 14px 10px; border-radius: 14px;
  text-align: center; font-size: 14px; font-weight: 600;
  line-height: 1.4; cursor: pointer;
  transition: transform 0.2s, opacity 0.2s;
  pointer-events: auto;
}
.decision-option:active { transform: scale(0.95); }
.decision-option.left {
  background: rgba(255,59,48,0.15); color: #FF453A;
  border: 1px solid rgba(255,59,48,0.3);
}
.decision-option.right {
  background: rgba(0,122,255,0.15); color: #0A84FF;
  border: 1px solid rgba(0,122,255,0.3);
}
.decision-swipe-hint {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 14px; color: #8E8E93; font-size: 11px;
}
.decision-swipe-hint .left-hint { color: #FF453A; }
.decision-swipe-hint .right-hint { color: #0A84FF; }
.decision-swipe-hint .mid { letter-spacing: 1px; }

/* Left/Right glow indicators on edge */
.swipe-edge-indicator {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 50px; height: 50px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; opacity: 0; transition: opacity 0.2s;
  pointer-events: none; z-index: 31;
}
.swipe-edge-indicator.left { left: 8px; background: rgba(255,59,48,0.2); }
.swipe-edge-indicator.right { right: 8px; background: rgba(0,122,255,0.2); }
.swipe-edge-indicator.show { opacity: 1; }

/* Ending Overlay */
.ending-overlay {
  position: absolute; inset: 0; background: rgba(0,0,0,0.92);
  z-index: 60; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 30px;
  opacity: 0; pointer-events: none; transition: opacity 0.5s;
}
.ending-overlay.active { opacity: 1; pointer-events: auto; }
.ending-card {
  background: #1C1C1E; border-radius: 24px; padding: 30px 24px;
  width: 100%; max-width: 320px; text-align: center;
  border: 0.5px solid rgba(255,255,255,0.15);
  animation: endingBounce 0.6s cubic-bezier(0.2, 0.8, 0.2, 1.3);
}
@keyframes endingBounce { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.ending-emoji { font-size: 64px; margin-bottom: 12px; }
.ending-title { color: #fff; font-size: 26px; font-weight: 800; margin-bottom: 6px; }
.ending-subtitle { color: #8E8E93; font-size: 14px; margin-bottom: 20px; line-height: 1.5; }
.ending-stats { display: flex; gap: 16px; justify-content: center; margin-bottom: 24px; }
.ending-stat { text-align: center; }
.ending-stat-val { color: #fff; font-size: 22px; font-weight: 700; }
.ending-stat-label { color: #8E8E93; font-size: 11px; margin-top: 2px; }
.ending-share {
  background: linear-gradient(135deg, #FF6B35, #D32F2F);
  color: #fff; border: none; padding: 14px 40px; border-radius: 25px;
  font-size: 16px; font-weight: 700; cursor: pointer; letter-spacing: 1px;
  transition: transform 0.2s;
}
.ending-share:active { transform: scale(0.95); }
.ending-restart {
  background: transparent; color: #007AFF; border: none;
  padding: 12px; font-size: 15px; cursor: pointer; margin-top: 8px;
}

/* Shake animation */
.shake { animation: shake 0.5s ease-in-out; }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  10%,50%,90% { transform: translateX(-4px); }
  30%,70% { transform: translateX(4px); }
}

/* Particle burst */
.particles {
  position: absolute; inset: 0; pointer-events: none; z-index: 65;
}
.particle {
  position: absolute; width: 6px; height: 6px; border-radius: 50%;
  animation: particleFly 0.8s ease-out forwards;
}
@keyframes particleFly {
  from { opacity: 1; transform: translate(0,0) scale(1); }
  to { opacity: 0; transform: translate(var(--dx),var(--dy)) scale(0); }
}

/* Stress meter */
.stress-meter {
  position: absolute; top: 60px; right: 10px; z-index: 35;
  width: 6px; height: 120px; background: rgba(255,255,255,0.1);
  border-radius: 3px; overflow: hidden;
  transition: opacity 0.3s;
}
.stress-fill {
  position: absolute; bottom: 0; width: 100%;
  border-radius: 3px; transition: height 0.5s ease-out, background 0.5s;
  background: var(--success);
}
.stress-label {
  position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
  font-size: 9px; color: #8E8E93; white-space: nowrap;
}

/* Toast */
.toast {
  position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
  background: rgba(28,28,30,0.95); color: #fff; padding: 8px 20px;
  border-radius: 20px; font-size: 13px; z-index: 45;
  opacity: 0; transition: opacity 0.3s; pointer-events: none;
}
.toast.show { opacity: 1; }

/* Desktop cursor for card */
@media (hover: hover) {
  .decision-card:hover { /* subtle hint */ }
}
</style>
</head>
<body>

<div class="phone" id="phone">
  <!-- Notch -->
  <div class="notch"></div>

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="time" id="gameTime">9:41</span>
    <span class="icons">
      <svg width="16" height="11" viewBox="0 0 16 11"><rect x="0" y="7" width="2" height="4" rx="0.5" fill="#fff"/><rect x="3" y="5.5" width="2" height="5.5" rx="0.5" fill="#fff"/><rect x="6" y="3.5" width="2" height="7.5" rx="0.5" fill="#fff"/><rect x="9" y="0" width="2" height="11" rx="0.5" fill="#fff"/></svg>
      <span style="font-size:11px">5G</span>
      <svg width="24" height="12" viewBox="0 0 24 12"><rect x="0" y="0" width="21" height="12" rx="3" stroke="#fff" stroke-width="1.2" fill="none"/><rect x="2" y="2" width="15" height="8" rx="1.5" fill="#fff"/></svg>
    </span>
  </div>

  <!-- Chat Header -->
  <div class="chat-header">
    <span class="back">‹ 返回</span>
    <div class="avatar">王</div>
    <div>
      <span class="name">王总 <span style="font-size:10px;color:gold;">💎VIP客户</span></span>
      <span class="status">● 在线</span>
    </div>
  </div>

  <!-- Chat Area -->
  <div class="chat-area" id="chatArea"></div>

  <!-- Stress Meter -->
  <div class="stress-meter" id="stressMeter">
    <div class="stress-label">😰压力</div>
    <div class="stress-fill" id="stressFill" style="height:20%;background:#34C759;"></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Notification Banner -->
  <div class="notification-banner" id="notifBanner">
    <div class="notif-icon"></div>
    <div class="notif-content">
      <div class="notif-app">微信 · 王总</div>
      <div class="notif-text" id="notifText"></div>
    </div>
    <div class="notif-time">刚刚</div>
  </div>

  <!-- Incoming Call Overlay -->
  <div class="call-overlay" id="callOverlay">
    <div class="call-avatar">王</div>
    <div class="call-name">王总</div>
    <div class="call-label">📞 语音通话邀请</div>
    <div class="call-actions">
      <div style="text-align:center">
        <button class="call-btn decline" onclick="handleCall(false)">
          <svg viewBox="0 0 24 24"><path d="M22 4.5L12.5 14l1.4 1.5L23.5 6z"/><path d="M4.9 3.7l-.6.6L17.5 18.3H21V6.1L9.2 17.9 7.8 16.5 19.6 4.7z"/></svg>
        </button>
        <div class="call-btn-label">挂断</div>
      </div>
      <div style="text-align:center">
        <button class="call-btn accept" onclick="handleCall(true)">
          <svg viewBox="0 0 24 24"><path d="M6.5 4.3c.9-.6 2-.4 2.6.5L9.6 6l-1.3 1.7c-.2.3-.2.7 0 1a10.2 10.2 0 0 0 7 7c.3.2.7.2 1 0L18 14.4l1.2.5c.9.6 1.1 1.7.5 2.6l-1 1.5c-.6.9-1.7 1.2-2.7.8-2.7-1.1-5.5-3-7.8-5.3s-4.2-5.1-5.3-7.8c-.4-1 .1-2.1.8-2.7l1.5-1z"/></svg>
        </button>
        <div class="call-btn-label">接听</div>
      </div>
    </div>
  </div>

  <!-- Decision Overlay -->
  <div class="decision-overlay" id="decisionOverlay">
    <div class="decision-hint">👆 左滑或右滑做出选择</div>
    <div class="decision-card" id="decisionCard">
      <div class="decision-prompt" id="decisionPrompt"></div>
      <div class="decision-options">
        <div class="decision-option left" id="optionLeft">← 左滑选择</div>
        <div class="decision-option right" id="optionRight">右滑选择 →</div>
      </div>
      <div class="decision-swipe-hint">
        <span class="left-hint">◁ 左滑</span>
        <span class="mid">滑动选择</span>
        <span class="right-hint">右滑 ▷</span>
      </div>
    </div>
  </div>

  <!-- Left/Right Swipe Edge Indicators -->
  <div class="swipe-edge-indicator left" id="swipeLeft">◁</div>
  <div class="swipe-edge-indicator right" id="swipeRight">▷</div>

  <!-- Ending Overlay -->
  <div class="ending-overlay" id="endingOverlay">
    <div class="ending-card" id="endingCard"></div>
    <button class="ending-restart" onclick="restartGame()">🔄 再来一局</button>
  </div>

  <!-- Particles -->
  <div class="particles" id="particles"></div>
</div>

<script>
// ── Game Engine ──────────────────────────────────
const chatArea = document.getElementById('chatArea');
const decisionOverlay = document.getElementById('decisionOverlay');
const decisionCard = document.getElementById('decisionCard');
const decisionPrompt = document.getElementById('decisionPrompt');
const optionLeft = document.getElementById('optionLeft');
const optionRight = document.getElementById('optionRight');
const notifBanner = document.getElementById('notifBanner');
const notifText = document.getElementById('notifText');
const callOverlay = document.getElementById('callOverlay');
const endingOverlay = document.getElementById('endingOverlay');
const endingCard = document.getElementById('endingCard');
const toast = document.getElementById('toast');
const gameTime = document.getElementById('gameTime');
const stressFill = document.getElementById('stressFill');
const swipeLeft = document.getElementById('swipeLeft');
const swipeRight = document.getElementById('swipeRight');

let stressLevel = 20;
let currentDecision = null; // { left: {label, next}, right: {label, next} }
let messageQueue = [];
let isTyping = false;
let gameActive = true;

// ── Helpers ──────────────────────────────────────
function setTime(t) { gameTime.textContent = t; }
function setStress(v) {
  stressLevel = Math.max(0, Math.min(100, v));
  stressFill.style.height = stressLevel + '%';
  if (stressLevel < 30) stressFill.style.background = '#34C759';
  else if (stressLevel < 60) stressFill.style.background = '#FFCC00';
  else stressFill.style.background = '#FF3B30';
}

function scrollChat() {
  chatArea.scrollTop = chatArea.scrollHeight;
}

function addMessage(type, text, time) {
  const row = document.createElement('div');
  row.className = 'msg-row ' + type;
  row.innerHTML = `<div class="msg-bubble">${text}</div>${time ? `<span class="msg-time">${time}</span>` : ''}`;
  chatArea.appendChild(row);
  scrollChat();
  return row;
}

function addVoiceMsg(time) {
  const row = document.createElement('div');
  row.className = 'msg-row them';
  row.innerHTML = `
    <div class="voice-bubble" style="animation: msgIn 0.35s ease-out;">
      <span style="font-size:20px;">🔊</span>
      <div class="wave"><span></span><span></span><span></span><span></span></div>
      <span class="dur">0:18</span>
    </div>
    <span class="msg-time">${time}</span>`;
  chatArea.appendChild(row);
  scrollChat();
}

function addInfoMsg(text) {
  addMessage('info', text);
}

function showTyping(duration) {
  return new Promise(resolve => {
    const el = document.createElement('div');
    el.className = 'typing-indicator';
    el.innerHTML = '<span></span><span></span><span></span>';
    chatArea.appendChild(el);
    scrollChat();
    setTimeout(() => { el.remove(); resolve(); }, duration);
  });
}

function showToast(msg, duration = 2000) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), duration);
}

function showNotification(text, duration = 2500) {
  notifText.textContent = text;
  notifBanner.classList.add('show');
  // vibrate visual
  document.getElementById('phone').classList.add('shake');

function spawnParticles(color = '#FF6B35') {

// ── Decision System ──────────────────────────────
let currentResolve = null;
let lastDirection = null; // tracks which way the user swiped

function showDecision(prompt, leftLabel, rightLabel, leftNext, rightNext) {
  return new Promise(resolve => {
    currentResolve = resolve;
    decisionPrompt.textContent = prompt;
    optionLeft.textContent = leftLabel;
    optionRight.textContent = rightLabel;
    currentDecision = { left: { label: leftLabel, next: leftNext }, right: { label: rightLabel, next: rightNext } };
    decisionOverlay.classList.add('active');
    decisionCard.classList.remove('swipe-left', 'swipe-right');
    decisionCard.style.transform = 'translateX(0) rotate(0deg)';
    swipeLeft.classList.remove('show');
    swipeRight.classList.remove('show');
  });
}

function makeChoice(direction) {
  if (!currentDecision || !gameActive) return;
  lastDirection = direction;
  const choice = direction === 'left' ? currentDecision.left : currentDecision.right;

  // Animate card
  decisionCard.classList.add(direction === 'left' ? 'swipe-left' : 'swipe-right');

  setTimeout(() => {
    decisionOverlay.classList.remove('active');
    decisionCard.classList.remove('swipe-left', 'swipe-right');
    swipeLeft.classList.remove('show');
    swipeRight.classList.remove('show');
    currentDecision = null;
    if (currentResolve) {
      const cb = currentResolve;
      currentResolve = null;
      cb(choice);
    }
  }, 300);
}

// Touch/Mouse swipe on decision card
let swipeStartX = 0, swipeStartY = 0, swipeActive = false, swipeOffsetX = 0;

decisionCard.addEventListener('pointerdown', e => {
  if (!gameActive) return;
  swipeStartX = e.clientX; swipeStartY = e.clientY;
  swipeActive = true; swipeOffsetX = 0;
  decisionCard.classList.add('swiping');
  decisionCard.setPointerCapture(e.pointerId);
});

decisionCard.addEventListener('pointermove', e => {
  if (!swipeActive) return;
  const dx = e.clientX - swipeStartX;
  const dy = e.clientY - swipeStartY;
  swipeOffsetX = dx;
  // Only track horizontal swipes
  const rotation = dx * 0.05;
  decisionCard.style.transform = `translateX(${dx}px) rotate(${rotation}deg)`;

  // Show edge indicators
  if (dx < -40) { swipeLeft.classList.add('show'); swipeRight.classList.remove('show'); }
  else if (dx > 40) { swipeRight.classList.add('show'); swipeLeft.classList.remove('show'); }
  else { swipeLeft.classList.remove('show'); swipeRight.classList.remove('show'); }
});

decisionCard.addEventListener('pointerup', e => {
  if (!swipeActive) return;
  swipeActive = false;
  decisionCard.classList.remove('swiping');
  decisionCard.classList.add('snap-back');
  swipeLeft.classList.remove('show');
  swipeRight.classList.remove('show');

  if (swipeOffsetX < -80) {
    makeChoice('left');
  } else if (swipeOffsetX > 80) {
    makeChoice('right');
  } else {
    decisionCard.style.transform = 'translateX(0) rotate(0deg)';
  }
  setTimeout(() => decisionCard.classList.remove('snap-back'), 350);
});

// Click fallback
optionLeft.addEventListener('click', () => makeChoice('left'));
optionRight.addEventListener('click', () => makeChoice('right'));

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (!currentDecision || !gameActive) return;
  if (e.key === 'ArrowLeft') makeChoice('left');
  if (e.key === 'ArrowRight') makeChoice('right');
});

// ── Call System ──────────────────────────────────
let callResolve = null;

function triggerCall() {
  return new Promise(resolve => {
    callResolve = resolve;
    callOverlay.classList.add('active');
    document.getElementById('phone').classList.add('shake');
    setTimeout(() => document.getElementById('phone').classList.remove('shake'), 600);
  });
}

function handleCall(accepted) {
  callOverlay.classList.remove('active');
  if (callResolve) {
    const cb = callResolve;
    callResolve = null;
    cb(accepted);
  }
}

// ── Scene Runner ─────────────────────────────────
async function runScene(messages, decisionData = null) {
  for (const msg of messages) {
    await new Promise(r => setTimeout(r, 300));

    if (msg.type === 'info') {
      addInfoMsg(msg.text);
      if (msg.time) setTime(msg.time);
    } else if (msg.type === 'them') {
      await showTyping(msg.typing || 800);
      addMessage('them', msg.text, msg.time);
    } else if (msg.type === 'voice') {
      await showTyping(400);
      addVoiceMsg(msg.time);
    } else if (msg.type === 'notification') {
      showNotification(msg.text, msg.duration || 2500);
      await new Promise(r => setTimeout(r, msg.wait || 1800));
    } else if (msg.type === 'call') {
      const accepted = await triggerCall();
      if (accepted) {
        // they spoke after call accepted
        for (const line of msg.lines) {
          await showTyping(line.typing || 600);
          addMessage('them', line.text, line.time);
        }
      }
    } else if (msg.type === 'me') {
      addMessage('me', msg.text, msg.time);
    } else if (msg.type === 'stress') {
      setStress(stressLevel + msg.delta);
      showToast(msg.toast || (msg.delta > 0 ? '😰 压力 +' + msg.delta : '😌 压力 ' + msg.delta));
    } else if (msg.type === 'delay') {
      await new Promise(r => setTimeout(r, msg.ms));
    }
  }

  if (decisionData) {
    const choice = await showDecision(
      decisionData.prompt,
      decisionData.left.label,
      decisionData.right.label
    );
    return choice;
  }
  return null;
}

showDecision = function(prompt, leftLabel, rightLabel, leftNext, rightNext) {

    origShowDecision(prompt, leftLabel, rightLabel).then(choice => {
      lastChoice = choice;

};

  if (!currentDecision || !gameActive) return;
  const choice = direction === 'left' ? currentDecision.left : currentDecision.right;
  lastChoice = choice;
  origMakeChoice(direction);
